<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Ticket System</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f1f5f9; }
        .glass-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #e2e8f0;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .status-badge { padding: 4px 12px; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; display: inline-flex; items-center; }
        .status-open { background-color: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .status-progress { background-color: #fef3c7; color: #d97706; border: 1px solid #fde68a; }
        .status-closed { background-color: #d1fae5; color: #059669; border: 1px solid #a7f3d0; }
    </style>
</head>
<body class="text-slate-800">

    <!-- Header -->
    <header class="glass-header sticky top-0 z-40 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-3">
            <div class="bg-blue-600 p-2 rounded-lg">
                <i data-lucide="layout-dashboard" class="text-white w-6 h-6"></i>
            </div>
            <h1 class="text-xl font-bold text-slate-800 tracking-tight">Admin<span class="text-blue-600">Ticket</span></h1>
        </div>
        <div class="flex items-center space-x-4">
            <button onclick="fetchTickets()" class="flex items-center space-x-2 text-sm text-slate-600 hover:text-blue-600 transition-colors bg-white px-4 py-2 rounded-lg border border-slate-200 shadow-sm">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                <span>รีเฟรชข้อมูล</span>
            </button>
            <div class="h-8 w-8 bg-slate-200 rounded-full flex items-center justify-center border-2 border-white shadow-sm overflow-hidden">
                <img src="https://ui-avatars.com/api/?name=Admin&background=0D8ABC&color=fff" alt="Admin">
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex items-center space-x-4">
                <div class="p-3 bg-red-100 text-red-600 rounded-lg"><i data-lucide="inbox" class="w-6 h-6"></i></div>
                <div>
                    <p class="text-sm font-medium text-slate-500">รอดำเนินการ (Open)</p>
                    <p class="text-2xl font-bold text-slate-800" id="stat-open">0</p>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex items-center space-x-4">
                <div class="p-3 bg-amber-100 text-amber-600 rounded-lg"><i data-lucide="loader" class="w-6 h-6"></i></div>
                <div>
                    <p class="text-sm font-medium text-slate-500">กำลังทำ (In Progress)</p>
                    <p class="text-2xl font-bold text-slate-800" id="stat-progress">0</p>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex items-center space-x-4">
                <div class="p-3 bg-emerald-100 text-emerald-600 rounded-lg"><i data-lucide="check-circle" class="w-6 h-6"></i></div>
                <div>
                    <p class="text-sm font-medium text-slate-500">ปิดงานแล้ว (Closed)</p>
                    <p class="text-2xl font-bold text-slate-800" id="stat-closed">0</p>
                </div>
            </div>
        </div>

        <!-- Table Card -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="px-6 py-5 border-b border-slate-200 bg-slate-50/50 flex justify-between items-center">
                <h2 class="text-lg font-bold text-slate-800">รายการ Ticket ทั้งหมด</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                            <th class="px-6 py-4 font-medium">Ticket ID / วันที่</th>
                            <th class="px-6 py-4 font-medium">ผู้แจ้ง</th>
                            <th class="px-6 py-4 font-medium">หัวข้อ / รายละเอียด</th>
                            <th class="px-6 py-4 font-medium text-center">ระดับ</th>
                            <th class="px-6 py-4 font-medium text-center">สถานะ</th>
                            <th class="px-6 py-4 font-medium text-right">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="ticketTableBody" class="divide-y divide-slate-100 text-sm">
                        <!-- Content will be injected via JS -->
                        <tr>
                            <td colspan="6" class="px-6 py-10 text-center text-slate-500">
                                <div class="flex flex-col items-center justify-center space-y-3">
                                    <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-blue-500"></i>
                                    <p>กำลังโหลดข้อมูล...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // กำหนดไอคอน
        lucide.createIcons();

        // ** สิ่งสำคัญ: ใส่ URL ของเว็บแอป (Google Apps Script) ที่คุณ Deploy ลงที่นี่ **
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxoupHfxfH3x6pvItELVW2wIXXTBi2zJi-1i3H9-7M_ZM5FxUJa64ITXItaTODl5-xKYw/exec";

        let allTickets = [];

        // ฟังก์ชันดึงข้อมูลจาก Google Sheets
        async function fetchTickets() {
            const tbody = document.getElementById('ticketTableBody');
            tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-10 text-center text-slate-500"><i data-lucide="loader-2" class="w-8 h-8 animate-spin text-blue-500 mx-auto mb-2"></i> กำลังโหลดข้อมูล...</td></tr>`;
            lucide.createIcons();

            try {
                // สำหรับ GET Data ฝั่ง Apps Script ถ้าใช้วิธี POST แบบนี้ต้องรับค่าผ่าน JSON กลับมา
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'get' })
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    allTickets = result.data;
                    renderTable();
                    updateStats();
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-10 text-center text-red-500">ไม่สามารถเชื่อมต่อฐานข้อมูลได้</td></tr>`;
            }
        }

        // ฟังก์ชันอัปเดตสถานะและปิดงาน
        async function updateStatus(id, currentStatus) {
            
            // เตรียมชุดข้อความ Template ตอบกลับอัตโนมัติ 10 แบบ
            const templates = [
                { name: "-- เลือกเทมเพลตตอบกลับด่วน --", text: "" },
                { 
                    name: "1. ขอข้อมูล/รายละเอียดเพิ่มเติม", 
                    text: "เรียนผู้ใช้บริการ,\n\nทางเราได้รับเรื่องของท่านแล้ว แต่เพื่อให้การตรวจสอบเป็นไปอย่างรวดเร็วและถูกต้อง กรุณาส่งข้อมูลรายละเอียดเพิ่มเติมมาที่อีเมล support@ponrakitt.site พร้อมระบุหมายเลข Ticket ของท่านในหัวข้ออีเมลด้วยครับ\n\nขอบคุณครับ" 
                },
                { 
                    name: "2. ขอรูปภาพ/ภาพหน้าจอ (Screenshot)", 
                    text: "เรียนผู้ใช้บริการ,\n\nเพื่อความรวดเร็วในการวิเคราะห์และแก้ไขปัญหา รบกวนท่านบันทึกภาพหน้าจอ (Screenshot) หรือวิดีโอขณะเกิดปัญหา แล้วแนบส่งมาที่อีเมล support@ponrakitt.site โดยระบุหมายเลข Ticket นี้ครับ\n\nขอบคุณครับ" 
                },
                { 
                    name: "3. รับเรื่องและกำลังเร่งตรวจสอบ", 
                    text: "เรียนผู้ใช้บริการ,\n\nขณะนี้ทีมงานได้รับทราบปัญหาของท่านแล้ว และกำลังเร่งตรวจสอบข้อมูลให้อย่างเร่งด่วน หากมีความคืบหน้าเพิ่มเติม ทีมงานจะรีบแจ้งให้ทราบผ่านช่องทางนี้ทันทีครับ\n\nขอบคุณที่ใช้บริการครับ" 
                },
                { 
                    name: "4. แก้ไขปัญหา/ดำเนินการเรียบร้อย", 
                    text: "เรียนผู้ใช้บริการ,\n\nทางทีมงานได้ดำเนินการแก้ไขปัญหาตามที่ท่านแจ้งเข้ามาเสร็จสิ้นเรียบร้อยแล้ว หากพบปัญหาการใช้งานอื่นๆ เพิ่มเติม หรือมีข้อสงสัย สามารถติดต่อเราได้ที่ support@ponrakitt.site ตลอดเวลาครับ\n\nขอบคุณครับ" 
                },
                { 
                    name: "5. ขอเอกสารยืนยันตัวตน", 
                    text: "เรียนผู้ใช้บริการ,\n\nเพื่อความปลอดภัยของข้อมูลบัญชีท่าน รบกวนส่งสำเนาเอกสารยืนยันตัวตนมายัง support@ponrakitt.site พร้อมระบุหมายเลข Ticket เพื่อให้ทีมงานสามารถดำเนินการในขั้นตอนต่อไปได้อย่างรวดเร็วครับ\n\nขอบคุณครับ" 
                },
                { 
                    name: "6. ระบบขัดข้องชั่วคราว (รับทราบปัญหา)", 
                    text: "เรียนผู้ใช้บริการ,\n\nปัญหาดังกล่าวเกิดจากระบบขัดข้องชั่วคราว ซึ่งขณะนี้ทีมงานวิศวกรกำลังเร่งแก้ไขอย่างสุดความสามารถ ทางเราต้องขออภัยในความไม่สะดวกที่เกิดขึ้นเป็นอย่างสูงครับ\n\nขอบคุณครับ" 
                },
                { 
                    name: "7. ประสานงาน/ส่งต่อหน่วยงานอื่น", 
                    text: "เรียนผู้ใช้บริการ,\n\nทางเราได้ประสานงานและส่งเรื่องของท่านไปยังฝ่ายที่เกี่ยวข้องเพื่อตรวจสอบเชิงลึกเรียบร้อยแล้ว ซึ่งอาจใช้เวลา 1-3 วันทำการ หากต้องการติดตามความคืบหน้า สามารถอีเมลสอบถามได้ที่ support@ponrakitt.site ครับ\n\nขอบคุณครับ" 
                },
                { 
                    name: "8. ไม่สามารถดำเนินการได้ (ผิดเงื่อนไข)", 
                    text: "เรียนผู้ใช้บริการ,\n\nทางเราต้องขออภัยที่ไม่อาจดำเนินการตามคำขอของท่านได้ เนื่องจากขัดกับนโยบายและเงื่อนไขการให้บริการ หากท่านมีข้อสงสัยเกี่ยวกับนโยบายเพิ่มเติม สามารถติดต่อสอบถามได้ที่ support@ponrakitt.site ครับ\n\nขอบคุณครับ" 
                },
                { 
                    name: "9. ติดตามผลการใช้งาน (Follow up)", 
                    text: "เรียนผู้ใช้บริการ,\n\nตามที่ท่านได้แจ้งปัญหาเข้ามา ไม่ทราบว่าปัจจุบันสามารถใช้งานได้ตามปกติแล้วหรือยังครับ? หากยังพบปัญหาเดิมอยู่ รบกวนแจ้งรายละเอียดเพิ่มเติมมาที่ support@ponrakitt.site ได้เลยครับ\n\nขอบคุณครับ" 
                },
                { 
                    name: "10. ขอบคุณสำหรับข้อเสนอแนะ/คำติชม", 
                    text: "เรียนผู้ใช้บริการ,\n\nขอขอบพระคุณสำหรับข้อเสนอแนะและคำติชมของท่าน ทางเราจะนำข้อมูลส่วนนี้ไปพิจารณาเพื่อพัฒนาและปรับปรุงระบบให้ดียิ่งขึ้น หากมีข้อเสนอแนะเพิ่มเติมสามารถส่งมาได้ที่ support@ponrakitt.site เสมอครับ\n\nขอบคุณครับ" 
                }
            ];

            let templateOptions = templates.map((t, index) => `<option value="${index}">${t.name}</option>`).join('');

            // นำ Template ไปสร้างเป็น Dropdown ใน SweetAlert
            const { value: formValues } = await Swal.fire({
                title: 'จัดการและตอบกลับ Ticket',
                width: '600px', // ปรับให้กว้างขึ้นเพื่อให้พิมพ์ง่าย
                html: `
                    <div class="text-left mb-4 mt-2">
                        <label class="block text-sm font-medium text-slate-700 mb-2">อัปเดตสถานะ:</label>
                        <select id="swal-status" class="w-full border border-slate-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="Open" ${currentStatus === 'Open' ? 'selected' : ''}>🔴 รอดำเนินการ (Open)</option>
                            <option value="In Progress" ${currentStatus === 'In Progress' ? 'selected' : ''}>🟡 กำลังดำเนินการ (In Progress)</option>
                            <option value="Closed" ${currentStatus === 'Closed' ? 'selected' : ''}>🟢 ปิดงาน (Close Ticket)</option>
                        </select>
                    </div>
                    <div class="text-left mb-4 bg-blue-50 p-4 rounded-lg border border-blue-100">
                        <label class="block text-sm font-medium text-blue-800 mb-2">เลือก Template ช่วยตอบ (ตัวช่วย):</label>
                        <select id="swal-template" class="w-full border border-blue-200 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none bg-white text-sm">
                            ${templateOptions}
                        </select>
                    </div>
                    <div class="text-left">
                        <label class="block text-sm font-medium text-slate-700 mb-2">ข้อความตอบกลับผู้ใช้ (แก้ไขเพิ่มเติมได้):</label>
                        <textarea id="swal-reply" rows="7" class="w-full border border-slate-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none resize-none text-sm leading-relaxed" placeholder="พิมพ์ข้อความตอบกลับที่นี่..."></textarea>
                    </div>
                `,
                didOpen: () => {
                    // Script สำหรับจับเหตุการณ์ตอนเลือก Template ให้เปลี่ยนข้อความใน Textarea
                    const templateSelect = document.getElementById('swal-template');
                    const replyBox = document.getElementById('swal-reply');
                    
                    templateSelect.addEventListener('change', (e) => {
                        const idx = e.target.value;
                        if(idx != 0) {
                            replyBox.value = templates[idx].text;
                        } else {
                            replyBox.value = "";
                        }
                    });
                },
                showCancelButton: true,
                confirmButtonText: 'บันทึกและส่งอีเมล',
                cancelButtonText: 'ยกเลิก',
                confirmButtonColor: '#3b82f6',
                preConfirm: () => {
                    return {
                        status: document.getElementById('swal-status').value,
                        reply: document.getElementById('swal-reply').value
                    }
                }
            });

            if (formValues) {
                Swal.fire({
                    title: 'กำลังอัปเดตและส่งอีเมล...',
                    allowOutsideClick: false,
                    didOpen: () => { Swal.showLoading(); }
                });

                try {
                    await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ 
                            action: 'update', 
                            payload: { 
                                id: id, 
                                status: formValues.status,
                                reply: formValues.reply
                            } 
                        })
                    });
                    
                    Swal.fire('สำเร็จ!', 'อัปเดตข้อมูลและส่งอีเมลแจ้งผู้ใช้งานเรียบร้อยแล้ว', 'success');
                    fetchTickets(); // โหลดข้อมูลใหม่
                } catch (error) {
                    Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถอัปเดตได้', 'error');
                }
            }
        }

        // วาดตารางข้อมูล
        function renderTable() {
            const tbody = document.getElementById('ticketTableBody');
            tbody.innerHTML = '';

            if (allTickets.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-10 text-center text-slate-500">ไม่มีข้อมูล Ticket ในระบบ</td></tr>`;
                return;
            }

            allTickets.forEach(ticket => {
                // ตกแต่งสถานะ
                let statusClass = '';
                let statusText = '';
                if(ticket.status === 'Open') { statusClass = 'status-open'; statusText = 'รอดำเนินการ'; }
                else if(ticket.status === 'In Progress') { statusClass = 'status-progress'; statusText = 'กำลังดำเนินการ'; }
                else { statusClass = 'status-closed'; statusText = 'ปิดงานแล้ว'; }

                // ตกแต่งระดับความเร่งด่วน
                let priorityHtml = '';
                if(ticket.priority === 'High') priorityHtml = '<span class="text-red-600 font-bold"><i data-lucide="chevrons-up" class="w-4 h-4 inline"></i> ด่วนมาก</span>';
                else if(ticket.priority === 'Medium') priorityHtml = '<span class="text-amber-500 font-medium"><i data-lucide="chevron-up" class="w-4 h-4 inline"></i> ปานกลาง</span>';
                else priorityHtml = '<span class="text-slate-500"><i data-lucide="minus" class="w-4 h-4 inline"></i> ปกติ</span>';

                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50/50 transition-colors';
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="font-bold text-slate-700">${ticket.id}</div>
                        <div class="text-xs text-slate-400 mt-1">${ticket.date}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="font-medium text-slate-800">${ticket.name}</div>
                        <div class="text-xs text-slate-500 flex items-center mt-1"><i data-lucide="mail" class="w-3 h-3 mr-1"></i> ${ticket.email}</div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="font-medium text-slate-800 mb-1">${ticket.subject}</div>
                        <div class="text-xs text-slate-500 line-clamp-2" title="${ticket.description}">${ticket.description}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-center">${priorityHtml}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-center">
                        <span class="status-badge ${statusClass}">${statusText}</span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right">
                        ${ticket.status !== 'Closed' 
                            ? `<button onclick="updateStatus('${ticket.id}', '${ticket.status}')" class="bg-white border border-slate-200 text-slate-600 hover:text-blue-600 hover:border-blue-200 hover:bg-blue-50 px-3 py-1.5 rounded-lg text-xs font-medium transition-colors shadow-sm inline-flex items-center space-x-1"><i data-lucide="edit-3" class="w-3.5 h-3.5"></i> <span>จัดการ</span></button>`
                            : `<button disabled class="bg-slate-50 border border-slate-200 text-slate-400 px-3 py-1.5 rounded-lg text-xs font-medium cursor-not-allowed inline-flex items-center space-x-1"><i data-lucide="lock" class="w-3.5 h-3.5"></i> <span>ปิดแล้ว</span></button>`
                        }
                    </td>
                `;
                tbody.appendChild(tr);
            });
            lucide.createIcons();
        }

        // นับจำนวนสถิติ
        function updateStats() {
            const open = allTickets.filter(t => t.status === 'Open').length;
            const progress = allTickets.filter(t => t.status === 'In Progress').length;
            const closed = allTickets.filter(t => t.status === 'Closed').length;

            document.getElementById('stat-open').textContent = open;
            document.getElementById('stat-progress').textContent = progress;
            document.getElementById('stat-closed').textContent = closed;
        }

        // เริ่มต้นการทำงาน
        window.onload = fetchTickets;
    </script>
</body>
</html>
