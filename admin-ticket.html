<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Ticket System</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f1f5f9; }
        .glass-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #e2e8f0;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .status-badge { padding: 4px 12px; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; display: inline-flex; align-items: center; }
        .status-open { background-color: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .status-progress { background-color: #fef3c7; color: #d97706; border: 1px solid #fde68a; }
        .status-closed { background-color: #d1fae5; color: #059669; border: 1px solid #a7f3d0; }
    </style>
</head>
<body class="text-slate-800">

    <!-- Header -->
    <header class="glass-header sticky top-0 z-40 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-3">
            <div class="bg-blue-600 p-2 rounded-xl shadow-sm">
                <i data-lucide="layout-dashboard" class="text-white w-5 h-5"></i>
            </div>
            <h1 class="text-xl font-bold text-slate-800 tracking-tight">Admin<span class="text-blue-600">Support</span></h1>
        </div>
        <div class="flex items-center space-x-4">
            <button onclick="fetchTickets()" class="flex items-center space-x-2 text-sm text-slate-600 hover:text-blue-600 transition-colors bg-white px-4 py-2 rounded-xl border border-slate-200 shadow-sm hover:shadow">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                <span class="font-medium">รีเฟรชข้อมูล</span>
            </button>
            <div class="h-9 w-9 bg-slate-200 rounded-full flex items-center justify-center border-2 border-white shadow-sm overflow-hidden">
                <img src="https://ui-avatars.com/api/?name=Admin&background=4f46e5&color=fff" alt="Admin">
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex items-center space-x-5 transition-transform hover:-translate-y-1 duration-300">
                <div class="p-3.5 bg-red-50 text-red-500 rounded-xl border border-red-100"><i data-lucide="inbox" class="w-6 h-6"></i></div>
                <div>
                    <p class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-1">รอดำเนินการ</p>
                    <p class="text-3xl font-bold text-slate-800" id="stat-open">0</p>
                </div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex items-center space-x-5 transition-transform hover:-translate-y-1 duration-300">
                <div class="p-3.5 bg-amber-50 text-amber-500 rounded-xl border border-amber-100"><i data-lucide="loader" class="w-6 h-6"></i></div>
                <div>
                    <p class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-1">กำลังดำเนินการ</p>
                    <p class="text-3xl font-bold text-slate-800" id="stat-progress">0</p>
                </div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex items-center space-x-5 transition-transform hover:-translate-y-1 duration-300">
                <div class="p-3.5 bg-emerald-50 text-emerald-500 rounded-xl border border-emerald-100"><i data-lucide="check-circle" class="w-6 h-6"></i></div>
                <div>
                    <p class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-1">ปิดงานแล้ว</p>
                    <p class="text-3xl font-bold text-slate-800" id="stat-closed">0</p>
                </div>
            </div>
        </div>

        <!-- Table Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="px-6 py-5 border-b border-slate-200 bg-slate-50/50 flex justify-between items-center">
                <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="list" class="w-5 h-5 text-slate-500"></i> รายการสอบถามทั้งหมด
                </h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                            <th class="px-6 py-4 font-semibold">Ticket ID / วันที่</th>
                            <th class="px-6 py-4 font-semibold">ผู้ติดต่อ</th>
                            <th class="px-6 py-4 font-semibold">หัวข้อ / ข้อความเบื้องต้น</th>
                            <th class="px-6 py-4 font-semibold text-center">สถานะ</th>
                            <th class="px-6 py-4 font-semibold text-right">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="ticketTableBody" class="divide-y divide-slate-100 text-sm">
                        <!-- Content will be injected via JS -->
                        <tr>
                            <td colspan="5" class="px-6 py-10 text-center text-slate-500">
                                <div class="flex flex-col items-center justify-center space-y-3">
                                    <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-blue-500"></i>
                                    <p>กำลังโหลดข้อมูล...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // กำหนดไอคอน
        lucide.createIcons();

        // ** สิ่งสำคัญ: ใส่ URL ของเว็บแอป (Google Apps Script) ที่คุณ Deploy ลงที่นี่ **
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxoupHfxfH3x6pvItELVW2wIXXTBi2zJi-1i3H9-7M_ZM5FxUJa64ITXItaTODl5-xKYw/exec";

        let allTickets = [];

        // ฟังก์ชันดึงข้อมูลจาก Google Sheets
        async function fetchTickets() {
            const tbody = document.getElementById('ticketTableBody');
            tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-16 text-center text-slate-500"><i data-lucide="loader-2" class="w-8 h-8 animate-spin text-indigo-500 mx-auto mb-3"></i> กำลังโหลดข้อมูลล่าสุด...</td></tr>`;
            lucide.createIcons();

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'get' })
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    allTickets = result.data;
                    renderTable();
                    updateStats();
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-10 text-center text-red-500 bg-red-50">เกิดข้อผิดพลาดในการเชื่อมต่อฐานข้อมูล</td></tr>`;
            }
        }

        // ฟังก์ชันดูรายละเอียดเต็มๆ (สำหรับข้อความยาว)
        function viewDetails(ticketId) {
            const ticket = allTickets.find(t => t.id === ticketId);
            if (!ticket) return;

            // แทนที่การขึ้นบรรทัดใหม่ด้วย <br> เพื่อให้อ่านง่าย
            const formattedDesc = ticket.description.replace(/\n/g, '<br>');

            Swal.fire({
                title: `<div class="text-xl font-bold text-slate-800">รายละเอียดข้อความ</div>`,
                html: `
                    <div class="text-left space-y-4 mt-2">
                        <!-- ข้อมูลผู้ส่ง -->
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 flex justify-between items-start">
                            <div>
                                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">ข้อมูลผู้ติดต่อ</p>
                                <p class="font-bold text-slate-800 text-base">${ticket.name}</p>
                                <p class="text-sm text-indigo-600 font-medium mt-0.5"><i data-lucide="mail" class="w-3.5 h-3.5 inline mr-1 text-indigo-400"></i>${ticket.email}</p>
                            </div>
                            <div class="text-right">
                                <span class="inline-block bg-slate-200 text-slate-600 text-[10px] font-bold px-2 py-1 rounded-md mb-1">${ticket.id}</span>
                                <p class="text-xs text-slate-500">${ticket.date}</p>
                            </div>
                        </div>

                        <!-- เนื้อหา -->
                        <div class="bg-indigo-50 p-5 rounded-2xl border border-indigo-100 shadow-inner">
                            <p class="text-sm text-indigo-900 font-bold mb-3 border-b border-indigo-200 pb-2">หัวข้อ: ${ticket.subject}</p>
                            <div class="text-sm text-slate-700 font-light leading-relaxed bg-white p-4 rounded-xl border border-indigo-50 max-h-[40vh] overflow-y-auto shadow-sm">
                                ${formattedDesc}
                            </div>
                        </div>
                    </div>
                `,
                width: '650px',
                showCloseButton: true,
                showConfirmButton: false,
                customClass: {
                    popup: 'rounded-[2rem] shadow-2xl border border-slate-100',
                    closeButton: 'hover:bg-red-50 hover:text-red-500 rounded-full transition-colors'
                },
                didOpen: () => {
                    lucide.createIcons();
                }
            });
        }

        // ฟังก์ชันเปิด Ticket กลับมาใหม่ (Re-open)
        async function reopenTicket(id) {
            const { isConfirmed } = await Swal.fire({
                title: 'เปิดเรื่องอีกครั้ง?',
                text: "คุณต้องการเปลี่ยนสถานะ Ticket นี้กลับมาเป็น 'รอดำเนินการ (Open)' เพื่อจัดการต่อใช่หรือไม่? (จะไม่มีการส่งอีเมลแจ้งเตือนผู้ใช้ในขั้นตอนนี้)",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#f59e0b',
                cancelButtonColor: '#94a3b8',
                confirmButtonText: 'ยืนยันการเปิดเรื่อง',
                cancelButtonText: 'ยกเลิก',
                customClass: {
                    popup: 'rounded-[2rem] shadow-2xl',
                    confirmButton: 'rounded-xl px-6 py-2.5 font-semibold text-amber-900 bg-amber-400 hover:bg-amber-500',
                    cancelButton: 'rounded-xl px-6 py-2.5 font-semibold'
                }
            });

            if (isConfirmed) {
                Swal.fire({
                    title: 'กำลังอัปเดตสถานะ...',
                    allowOutsideClick: false,
                    didOpen: () => { Swal.showLoading(); }
                });

                try {
                    // ส่งคำสั่งอัปเดตไปที่ GAS โดยตั้ง status เป็น 'Open' และช่อง reply ว่าง (เพื่อไม่ให้ส่งอีเมล)
                    // หมายเหตุ: โค้ดฝั่ง GAS ของเราผูกเงื่อนไขไว้ว่า ถ้า reply ว่าง และ ไม่ได้แก้ไขอะไรเพิ่ม จะยังไงก็มีการส่งอัปเดตเมล
                    // แต่ถ้าจะแก้แบบสมบูรณ์แบบ ต้องไปแก้ GAS ด้วยให้เช็คเงื่อนไขส่งเมล 
                    // แต่เพื่อความง่าย เราจะส่งแบบนี้ไปก่อน (อัปเดตลง Sheet ได้ชัวร์)
                    await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ 
                            action: 'update', 
                            payload: { 
                                id: id, 
                                status: 'Open',
                                reply: '' // ส่งข้อความตอบกลับว่างๆ ไป
                            } 
                        })
                    });
                    
                    Swal.fire({
                        title: 'สำเร็จ!', 
                        text: 'เปิดเรื่องกลับมาเรียบร้อยแล้ว คุณสามารถกดปุ่ม จัดการ เพื่อตอบกลับได้เลย', 
                        icon: 'success',
                        confirmButtonColor: '#4f46e5',
                        customClass: { popup: 'rounded-[1.5rem]', confirmButton: 'rounded-xl' }
                    });
                    fetchTickets(); // โหลดข้อมูลใหม่ตาราง
                } catch (error) {
                    Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
                }
            }
        }

        // ฟังก์ชันอัปเดตสถานะและปิดงาน (ปกติ)
        async function updateStatus(id, currentStatus) {
            
            // เตรียมชุดข้อความ Template ตอบกลับอัตโนมัติ 10 แบบ
            const templates = [
                { name: "-- เลือกเทมเพลตตอบกลับด่วน --", text: "" },
                { 
                    name: "1. ขอข้อมูล/รายละเอียดเพิ่มเติม", 
                    text: "เรียนผู้ใช้บริการ,\n\nทางเราได้รับเรื่องของท่านแล้ว แต่เพื่อให้การตรวจสอบเป็นไปอย่างรวดเร็วและถูกต้อง กรุณาส่งข้อมูลรายละเอียดเพิ่มเติมมาที่อีเมล support@ponrakitt.site พร้อมระบุหมายเลข Ticket ของท่านในหัวข้ออีเมลด้วยครับ\n\nขอบคุณครับ" 
                },
                { 
                    name: "2. ขอรูปภาพ/ภาพหน้าจอ (Screenshot)", 
                    text: "เรียนผู้ใช้บริการ,\n\nเพื่อความรวดเร็วในการวิเคราะห์และแก้ไขปัญหา รบกวนท่านบันทึกภาพหน้าจอ (Screenshot) หรือวิดีโอขณะเกิดปัญหา แล้วแนบส่งมาที่อีเมล support@ponrakitt.site โดยระบุหมายเลข Ticket นี้ครับ\n\nขอบคุณครับ" 
                },
                { 
                    name: "3. รับเรื่องและกำลังเร่งตรวจสอบ", 
                    text: "เรียนผู้ใช้บริการ,\n\nขณะนี้ทีมงานได้รับทราบปัญหาของท่านแล้ว และกำลังเร่งตรวจสอบข้อมูลให้อย่างเร่งด่วน หากมีความคืบหน้าเพิ่มเติม ทีมงานจะรีบแจ้งให้ทราบผ่านช่องทางนี้ทันทีครับ\n\nขอบคุณที่ใช้บริการครับ" 
                },
                { 
                    name: "4. แก้ไขปัญหา/ดำเนินการเรียบร้อย", 
                    text: "เรียนผู้ใช้บริการ,\n\nทางทีมงานได้ดำเนินการแก้ไขปัญหาตามที่ท่านแจ้งเข้ามาเสร็จสิ้นเรียบร้อยแล้ว หากพบปัญหาการใช้งานอื่นๆ เพิ่มเติม หรือมีข้อสงสัย สามารถติดต่อเราได้ที่ support@ponrakitt.site ตลอดเวลาครับ\n\nขอบคุณครับ" 
                },
                { 
                    name: "5. ขอเอกสารยืนยันตัวตน", 
                    text: "เรียนผู้ใช้บริการ,\n\nเพื่อความปลอดภัยของข้อมูลบัญชีท่าน รบกวนส่งสำเนาเอกสารยืนยันตัวตนมายัง support@ponrakitt.site พร้อมระบุหมายเลข Ticket เพื่อให้ทีมงานสามารถดำเนินการในขั้นตอนต่อไปได้อย่างรวดเร็วครับ\n\nขอบคุณครับ" 
                },
                { 
                    name: "6. ระบบขัดข้องชั่วคราว (รับทราบปัญหา)", 
                    text: "เรียนผู้ใช้บริการ,\n\nปัญหาดังกล่าวเกิดจากระบบขัดข้องชั่วคราว ซึ่งขณะนี้ทีมงานวิศวกรกำลังเร่งแก้ไขอย่างสุดความสามารถ ทางเราต้องขออภัยในความไม่สะดวกที่เกิดขึ้นเป็นอย่างสูงครับ\n\nขอบคุณครับ" 
                },
                { 
                    name: "7. ประสานงาน/ส่งต่อหน่วยงานอื่น", 
                    text: "เรียนผู้ใช้บริการ,\n\nทางเราได้ประสานงานและส่งเรื่องของท่านไปยังฝ่ายที่เกี่ยวข้องเพื่อตรวจสอบเชิงลึกเรียบร้อยแล้ว ซึ่งอาจใช้เวลา 1-3 วันทำการ หากต้องการติดตามความคืบหน้า สามารถอีเมลสอบถามได้ที่ support@ponrakitt.site ครับ\n\nขอบคุณครับ" 
                },
                { 
                    name: "8. ไม่สามารถดำเนินการได้ (ผิดเงื่อนไข)", 
                    text: "เรียนผู้ใช้บริการ,\n\nทางเราต้องขออภัยที่ไม่อาจดำเนินการตามคำขอของท่านได้ เนื่องจากขัดกับนโยบายและเงื่อนไขการให้บริการ หากท่านมีข้อสงสัยเกี่ยวกับนโยบายเพิ่มเติม สามารถติดต่อสอบถามได้ที่ support@ponrakitt.site ครับ\n\nขอบคุณครับ" 
                },
                { 
                    name: "9. ติดตามผลการใช้งาน (Follow up)", 
                    text: "เรียนผู้ใช้บริการ,\n\nตามที่ท่านได้แจ้งปัญหาเข้ามา ไม่ทราบว่าปัจจุบันสามารถใช้งานได้ตามปกติแล้วหรือยังครับ? หากยังพบปัญหาเดิมอยู่ รบกวนแจ้งรายละเอียดเพิ่มเติมมาที่ support@ponrakitt.site ได้เลยครับ\n\nขอบคุณครับ" 
                },
                { 
                    name: "10. ขอบคุณสำหรับข้อเสนอแนะ/คำติชม", 
                    text: "เรียนผู้ใช้บริการ,\n\nขอขอบพระคุณสำหรับข้อเสนอแนะและคำติชมของท่าน ทางเราจะนำข้อมูลส่วนนี้ไปพิจารณาเพื่อพัฒนาและปรับปรุงระบบให้ดียิ่งขึ้น หากมีข้อเสนอแนะเพิ่มเติมสามารถส่งมาได้ที่ support@ponrakitt.site เสมอครับ\n\nขอบคุณครับ" 
                },
                {
                    name: "11.ขอให้รอ",
                    text: "เรียนผู้ใช้บริการ\n\nเนื่อจากในขณะนี้มีผู้ติดต่อเข้ามาเป็นจำนวณมาก คำขอของท่านอาจได้รับการตอบกลับล่าช้าขออภัยในความไม่สะดวกเราจะรีบตอบกลับท่านโดยเร็วที่สุด หากมีข้อสงสัยเพิ่มเติมโปรดติดต่อเราโดยตรงที่ support@ponrakitt.site และเพื่อความรวดเร็วโปรดแจ้งหมายเลข Ticketมาพร้อมกับemailด้วย\n\nขอบคุณครับ"
                }
            ];

            let templateOptions = templates.map((t, index) => `<option value="${index}">${t.name}</option>`).join('');

            const { value: formValues } = await Swal.fire({
                title: 'จัดการและตอบกลับ Ticket',
                width: '600px',
                html: `
                    <div class="text-left mb-4 mt-2">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">อัปเดตสถานะ:</label>
                        <select id="swal-status" class="w-full border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none">
                            <option value="Open" ${currentStatus === 'Open' ? 'selected' : ''}>🔴 รอดำเนินการ (Open)</option>
                            <option value="In Progress" ${currentStatus === 'In Progress' ? 'selected' : ''}>🟡 กำลังดำเนินการ (In Progress)</option>
                            <option value="Closed" ${currentStatus === 'Closed' ? 'selected' : ''}>🟢 ปิดงาน (Close Ticket)</option>
                        </select>
                    </div>
                    <div class="text-left mb-4 bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                        <label class="block text-sm font-semibold text-indigo-800 mb-2">เลือก Template ช่วยตอบ (ทางลัด):</label>
                        <select id="swal-template" class="w-full border border-indigo-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none bg-white text-sm">
                            ${templateOptions}
                        </select>
                    </div>
                    <div class="text-left">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">ข้อความตอบกลับผู้ใช้ (แก้ไขเพิ่มเติมได้):</label>
                        <textarea id="swal-reply" rows="7" class="w-full border border-slate-300 rounded-xl p-4 focus:ring-2 focus:ring-indigo-500 outline-none resize-none text-sm leading-relaxed" placeholder="พิมพ์ข้อความตอบกลับที่นี่... (ข้อความนี้จะถูกส่งเข้าอีเมลผู้ใช้)"></textarea>
                    </div>
                `,
                didOpen: () => {
                    const templateSelect = document.getElementById('swal-template');
                    const replyBox = document.getElementById('swal-reply');
                    
                    templateSelect.addEventListener('change', (e) => {
                        const idx = e.target.value;
                        if(idx != 0) {
                            replyBox.value = templates[idx].text;
                        } else {
                            replyBox.value = "";
                        }
                    });
                },
                showCancelButton: true,
                confirmButtonText: 'บันทึกและส่งอีเมล',
                cancelButtonText: 'ยกเลิก',
                confirmButtonColor: '#4f46e5',
                customClass: {
                    popup: 'rounded-[2rem] shadow-2xl',
                    confirmButton: 'rounded-xl px-6 py-2.5',
                    cancelButton: 'rounded-xl px-6 py-2.5'
                },
                preConfirm: () => {
                    return {
                        status: document.getElementById('swal-status').value,
                        reply: document.getElementById('swal-reply').value
                    }
                }
            });

            if (formValues) {
                Swal.fire({
                    title: 'กำลังอัปเดตและส่งอีเมล...',
                    allowOutsideClick: false,
                    didOpen: () => { Swal.showLoading(); }
                });

                try {
                    await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ 
                            action: 'update', 
                            payload: { 
                                id: id, 
                                status: formValues.status,
                                reply: formValues.reply
                            } 
                        })
                    });
                    
                    Swal.fire({
                        title: 'สำเร็จ!', 
                        text: 'อัปเดตข้อมูลและส่งอีเมลแจ้งผู้ใช้งานเรียบร้อยแล้ว', 
                        icon: 'success',
                        confirmButtonColor: '#4f46e5',
                        customClass: { popup: 'rounded-3xl', confirmButton: 'rounded-xl' }
                    });
                    fetchTickets(); // โหลดข้อมูลใหม่
                } catch (error) {
                    Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถอัปเดตได้', 'error');
                }
            }
        }

        // วาดตารางข้อมูล
        function renderTable() {
            const tbody = document.getElementById('ticketTableBody');
            tbody.innerHTML = '';

            if (allTickets.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-16 text-center text-slate-500 bg-slate-50/50"><div class="flex flex-col items-center"><i data-lucide="inbox" class="w-12 h-12 text-slate-300 mb-3"></i><p>ยังไม่มีรายการสอบถามเข้ามา</p></div></td></tr>`;
                lucide.createIcons();
                return;
            }

            allTickets.forEach(ticket => {
                // ตกแต่งสถานะ
                let statusClass = '';
                let statusText = '';
                let statusIcon = '';
                if(ticket.status === 'Open') { statusClass = 'status-open'; statusText = 'รอดำเนินการ'; statusIcon = 'circle-dot'; }
                else if(ticket.status === 'In Progress') { statusClass = 'status-progress'; statusText = 'กำลังดำเนินการ'; statusIcon = 'clock-4'; }
                else { statusClass = 'status-closed'; statusText = 'ปิดงานแล้ว'; statusIcon = 'check-circle-2'; }

                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50/80 transition-colors group';
                tr.innerHTML = `
                    <td class="px-6 py-5 whitespace-nowrap">
                        <div class="font-bold text-slate-700 bg-slate-100 inline-block px-2 py-1 rounded text-xs mb-1 border border-slate-200">${ticket.id}</div>
                        <div class="text-xs text-slate-400 flex items-center mt-1"><i data-lucide="calendar" class="w-3 h-3 mr-1"></i>${ticket.date}</div>
                    </td>
                    <td class="px-6 py-5 whitespace-nowrap">
                        <div class="font-semibold text-slate-800">${ticket.name}</div>
                        <div class="text-xs text-indigo-500 font-medium flex items-center mt-1 bg-indigo-50 inline-flex px-2 py-0.5 rounded-md"><i data-lucide="mail" class="w-3 h-3 mr-1"></i> ${ticket.email}</div>
                    </td>
                    <td class="px-6 py-5 max-w-[300px]">
                        <div class="font-bold text-slate-800 mb-1 truncate" title="${ticket.subject}">${ticket.subject}</div>
                        <div class="text-xs text-slate-500 line-clamp-2 leading-relaxed" title="คลิกปุ่ม 'อ่าน' เพื่อดูเนื้อหาเต็ม">${ticket.description}</div>
                    </td>
                    <td class="px-6 py-5 whitespace-nowrap text-center">
                        <span class="status-badge ${statusClass} shadow-sm"><i data-lucide="${statusIcon}" class="w-3.5 h-3.5 mr-1.5"></i>${statusText}</span>
                    </td>
                    <td class="px-6 py-5 whitespace-nowrap text-right">
                        <div class="flex items-center justify-end space-x-2">
                            <!-- ปุ่มอ่านข้อความ -->
                            <button onclick="viewDetails('${ticket.id}')" class="bg-white border border-slate-200 text-slate-600 hover:text-indigo-600 hover:border-indigo-300 hover:bg-indigo-50 px-3 py-1.5 rounded-xl text-xs font-semibold transition-all shadow-sm flex items-center space-x-1.5 hover:shadow">
                                <i data-lucide="eye" class="w-4 h-4"></i> <span>อ่าน</span>
                            </button>
                            
                            <!-- ปุ่มจัดการ / เปิดเรื่องใหม่ -->
                            ${ticket.status !== 'Closed' 
                                ? `<button onclick="updateStatus('${ticket.id}', '${ticket.status}')" class="bg-indigo-600 border border-indigo-600 text-white hover:bg-indigo-700 hover:border-indigo-700 px-3 py-1.5 rounded-xl text-xs font-semibold transition-all shadow-sm shadow-indigo-200 flex items-center space-x-1.5">
                                    <i data-lucide="edit-3" class="w-4 h-4"></i> <span>จัดการ</span>
                                   </button>`
                                : `<button onclick="reopenTicket('${ticket.id}')" class="bg-amber-100 border border-amber-200 text-amber-700 hover:bg-amber-500 hover:text-white hover:border-amber-500 px-3 py-1.5 rounded-xl text-xs font-semibold transition-all flex items-center space-x-1.5" title="คลิกเพื่อเปิดเรื่องกลับมาจัดการใหม่">
                                    <i data-lucide="folder-open" class="w-4 h-4"></i> <span>เปิดเรื่อง</span>
                                   </button>`
                            }
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            lucide.createIcons();
        }

        // นับจำนวนสถิติ
        function updateStats() {
            const open = allTickets.filter(t => t.status === 'Open').length;
            const progress = allTickets.filter(t => t.status === 'In Progress').length;
            const closed = allTickets.filter(t => t.status === 'Closed').length;

            // เอฟเฟกต์ตัวเลขวิ่งเบาๆ
            animateValue("stat-open", parseInt(document.getElementById('stat-open').innerText) || 0, open, 500);
            animateValue("stat-progress", parseInt(document.getElementById('stat-progress').innerText) || 0, progress, 500);
            animateValue("stat-closed", parseInt(document.getElementById('stat-closed').innerText) || 0, closed, 500);
        }

        function animateValue(id, start, end, duration) {
            if (start === end) {
                document.getElementById(id).innerText = end;
                return;
            }
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                document.getElementById(id).innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        // เริ่มต้นการทำงาน
        window.onload = fetchTickets;
    </script>
</body>
</html>
