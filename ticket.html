<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ศูนย์ช่วยเหลือผู้ใช้งาน | Submit Ticket</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- SweetAlert2 สำหรับแจ้งเตือนสวยๆ -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05);
        }
        .bg-gradient-custom {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
        }
        /* Loader */
        .loader {
            border: 3px solid #f3f3f3; border-top: 3px solid #ffffff; border-radius: 50%;
            width: 20px; height: 20px; animation: spin 1s linear infinite; display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden">
    
    <!-- Background Decoration -->
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-indigo-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-2000"></div>

    <div class="w-full max-w-2xl glass-card rounded-2xl overflow-hidden relative z-10">
        
        <!-- Header -->
        <div class="relative px-8 py-12 overflow-hidden bg-slate-900 text-white">
            <!-- Decorative Glow Elements -->
            <div class="absolute top-0 right-0 w-64 h-64 bg-blue-500/20 rounded-full blur-3xl -mr-16 -mt-16 pointer-events-none"></div>
            <div class="absolute bottom-0 left-0 w-64 h-64 bg-indigo-500/30 rounded-full blur-3xl -ml-16 -mb-16 pointer-events-none"></div>
            
            <div class="relative z-10 flex flex-col items-center text-center">
                <span class="inline-flex items-center gap-1.5 px-3 py-1 mb-5 text-xs font-semibold tracking-widest text-blue-300 uppercase bg-blue-500/10 border border-blue-400/30 rounded-full shadow-sm">
                    <i data-lucide="headphones" class="w-3.5 h-3.5"></i>
                    Support Center
                </span>
                <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight mb-3 text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-400">
                    How can we help you?
                </h1>
                <p class="text-slate-400 font-light text-sm md:text-base max-w-md mx-auto">
                    ระบบแจ้งปัญหาและติดต่อแอดมิน กรอกข้อมูลด้านล่างเพื่อเปิด Ticket ใหม่
                </p>
            </div>
        </div>

        <!-- Form -->
        <form id="ticketForm" class="p-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Name -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">ชื่อ - นามสกุล <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="user" class="h-5 w-5 text-slate-400"></i>
                        </div>
                        <input type="text" id="name" required class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors text-slate-800 bg-slate-50 placeholder-slate-400" placeholder="ระบุชื่อของคุณ">
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">อีเมลติดต่อ <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="mail" class="h-5 w-5 text-slate-400"></i>
                        </div>
                        <input type="email" id="email" required class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors text-slate-800 bg-slate-50 placeholder-slate-400" placeholder="example@email.com">
                    </div>
                </div>
            </div>

            <!-- Subject -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">หัวข้อเรื่อง <span class="text-red-500">*</span></label>
                <input type="text" id="subject" required class="block w-full px-4 py-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors text-slate-800 bg-slate-50 placeholder-slate-400" placeholder="เช่น ระบบขัดข้อง, สอบถามข้อมูล">
            </div>

            <!-- Description -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">รายละเอียดปัญหา <span class="text-red-500">*</span></label>
                <textarea id="description" rows="5" required class="block w-full px-4 py-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors text-slate-800 bg-slate-50 placeholder-slate-400 resize-none" placeholder="อธิบายรายละเอียดปัญหาที่คุณพบ..."></textarea>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn" class="w-full flex items-center justify-center space-x-2 bg-blue-600 hover:bg-blue-700 text-white font-medium py-3.5 px-4 rounded-lg transition-all duration-300 transform hover:-translate-y-0.5 shadow-lg hover:shadow-blue-500/30">
                <span id="btnText">ส่งข้อมูล (Submit Ticket)</span>
                <i data-lucide="send" id="btnIcon" class="h-5 w-5"></i>
                <div class="loader" id="btnLoader"></div>
            </button>
        </form>
    </div>

    <script>
        // กำหนดไอคอน Lucide
        lucide.createIcons();

        // ** สิ่งสำคัญ: ใส่ URL ของเว็บแอป (Google Apps Script) ที่คุณ Deploy ลงที่นี่ **
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxoupHfxfH3x6pvItELVW2wIXXTBi2zJi-1i3H9-7M_ZM5FxUJa64ITXItaTODl5-xKYw/exec";

        document.getElementById('ticketForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // UI Loading state
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const btnLoader = document.getElementById('btnLoader');

            btn.disabled = true;
            btn.classList.replace('bg-blue-600', 'bg-blue-400');
            btnText.textContent = "กำลังส่งข้อมูล...";
            btnIcon.style.display = 'none';
            btnLoader.style.display = 'block';

            // จัดเตรียมข้อมูล
            const payload = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                subject: document.getElementById('subject').value,
                priority: '-', // กำหนดค่าเริ่มต้นแทนการดึงจาก Dropdown ที่ถูกลบออกไป
                description: document.getElementById('description').value
            };

            try {
                // เพิ่ม mode: 'no-cors' เพื่อบังคับข้ามการบล็อกของ Browser
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'create', payload: payload })
                });

                // แสดงข้อความสำเร็จ (SweetAlert)
                Swal.fire({
                    title: 'ส่งข้อมูลสำเร็จ!',
                    text: 'ระบบได้ส่งอีเมลยืนยันไปยังอีเมลของคุณแล้ว ทีมงานจะรีบดำเนินการครับ',
                    icon: 'success',
                    confirmButtonColor: '#3b82f6',
                    confirmButtonText: 'ตกลง'
                });
                
                // รีเซ็ตฟอร์ม
                document.getElementById('ticketForm').reset();

            } catch (error) {
                console.error(error);
                Swal.fire({
                    title: 'เกิดข้อผิดพลาด',
                    text: 'ไม่สามารถส่งข้อมูลได้ กรุณาลองใหม่อีกครั้ง หรือติดต่อผู้ดูแลระบบ',
                    icon: 'error',
                    confirmButtonColor: '#ef4444'
                });
            } finally {
                // คืนสถานะปุ่ม
                btn.disabled = false;
                btn.classList.replace('bg-blue-400', 'bg-blue-600');
                btnText.textContent = "ส่งข้อมูล (Submit Ticket)";
                btnIcon.style.display = 'block';
                btnLoader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
