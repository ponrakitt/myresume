<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>ติดต่อเรา | Contact Support</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { 
            font-family: 'Prompt', sans-serif; 
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 24px 24px;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* ป้องกัน iOS Zoom และปรับ Input ให้ดูพรีเมียมแบบมินิมอล */
        .modern-input {
            transition: all 0.2s ease-in-out;
            font-size: 16px !important; 
        }
        .modern-input:focus {
            background-color: #ffffff;
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        /* Loader */
        .loader {
            border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid #ffffff; border-radius: 50%;
            width: 18px; height: 18px; animation: spin 1s linear infinite; display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* ซ่อนลูกศรขึ้นลงใน input type number */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-0 sm:p-6 lg:p-8 selection:bg-indigo-500 selection:text-white">

    <!-- Main Container -->
    <div class="w-full min-h-screen sm:min-h-0 max-w-6xl bg-white sm:rounded-[2rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] sm:border border-slate-100 overflow-hidden relative z-10 flex flex-col lg:flex-row fade-up">
        
        <!-- Left Side: Brand & Info -->
        <div class="w-full lg:w-5/12 bg-slate-900 text-white p-8 sm:p-12 lg:p-14 flex flex-col justify-between relative overflow-hidden">
            
            <!-- Subtle Background Glow -->
            <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
                <div class="absolute -top-[20%] -right-[10%] w-[70%] h-[70%] rounded-full bg-indigo-600/20 blur-[80px]"></div>
                <div class="absolute -bottom-[20%] -left-[10%] w-[70%] h-[70%] rounded-full bg-blue-600/20 blur-[80px]"></div>
            </div>

            <div class="relative z-10 flex flex-col h-full">
                <!-- Badge -->
                <div class="mb-8 lg:mb-12">
                    <span class="inline-flex items-center gap-2 px-3 py-1.5 text-xs font-semibold tracking-wide text-indigo-300 bg-indigo-500/10 border border-indigo-500/20 rounded-full">
                        <i data-lucide="headphones" class="w-3.5 h-3.5"></i>
                        Support Center
                    </span>
                </div>
                
                <h1 class="text-3xl sm:text-4xl lg:text-5xl font-bold tracking-tight mb-4 sm:mb-6 leading-[1.15] text-white">
                    มีอะไรให้เรา<br>ช่วยเหลือหรือไม่?
                </h1>

                <!-- Contact Info -->
                <div class="space-y-6 mt-auto">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full bg-white/5 border border-white/10 flex items-center justify-center shrink-0">
                            <i data-lucide="mail" class="w-5 h-5 text-indigo-400"></i>
                        </div>
                        <div>
                            <p class="text-xs text-slate-400 font-medium uppercase tracking-wider mb-0.5">อีเมลติดต่อ</p>
                            <p class="font-medium text-white text-base">support@ponrakitt.site</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="relative z-10 mt-12 pt-8 border-t border-white/10 hidden sm:block">
                <p class="text-xs text-slate-500">© 2026 Ponrakitt.site. All rights reserved.</p>
            </div>
        </div>

        <!-- Right Side: Clean Form -->
        <div class="w-full lg:w-7/12 p-6 sm:p-12 lg:p-16 bg-white flex-1 relative z-20 -mt-6 sm:mt-0 rounded-t-3xl sm:rounded-none">
            
            <div class="mb-8 flex justify-between items-end">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">ส่งข้อความ</h2>
                    <p class="text-slate-500 text-sm mt-1.5">เราจะตอบกลับไปยังอีเมลที่คุณระบุไว้</p>
                </div>
                
                <!-- ปุ่มคู่มือการใช้งาน -->
                <button type="button" onclick="showGuide()" class="group flex items-center gap-2 px-4 py-2 rounded-full bg-slate-50 text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 transition-colors border border-slate-200 hover:border-indigo-200">
                    <i data-lucide="help-circle" class="w-4 h-4"></i>
                    <span class="text-sm font-medium hidden sm:inline">วิธีใช้งาน</span>
                </button>
            </div>
            
            <form id="contactForm" class="space-y-5">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                    <!-- Name -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">ชื่อ - นามสกุล <span class="text-red-500">*</span></label>
                        <input type="text" id="name" required 
                               class="modern-input block w-full px-4 py-3 bg-slate-50/50 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 outline-none" 
                               placeholder="ระบุชื่อของคุณ">
                    </div>

                    <!-- Email -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">อีเมลติดต่อ <span class="text-red-500">*</span></label>
                        <input type="email" id="email" required 
                               class="modern-input block w-full px-4 py-3 bg-slate-50/50 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 outline-none" 
                               placeholder="example@email.com">
                    </div>
                </div>

                <!-- Subject -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">หัวข้อที่ต้องการสอบถาม <span class="text-red-500">*</span></label>
                    <input type="text" id="subject" required 
                           class="modern-input block w-full px-4 py-3 bg-slate-50/50 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 outline-none" 
                           placeholder="เช่น สอบถามบริการ, แจ้งปัญหาการใช้งาน">
                </div>

                <!-- Description -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">รายละเอียด / ข้อความ <span class="text-red-500">*</span></label>
                    <textarea id="description" rows="4" required 
                              class="modern-input block w-full px-4 py-3 bg-slate-50/50 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 outline-none resize-none" 
                              placeholder="อธิบายรายละเอียดเพิ่มเติมเพื่อให้เราช่วยเหลือได้รวดเร็วขึ้น..."></textarea>
                </div>

                <!-- Bot Protection (Honeypot) -->
                <div class="hidden">
                    <input type="text" id="honeypot" tabindex="-1" autocomplete="off" placeholder="Leave this empty">
                </div>

                <!-- Bot Protection (Math CAPTCHA) -->
                <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 flex items-center justify-between gap-4">
                    <div class="flex items-center gap-3">
                        <div class="text-slate-400">
                            <i data-lucide="shield-check" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <p class="text-sm font-medium text-slate-700" id="captchaQuestion">กรุณาบวกเลข: ? + ?</p>
                            <p class="text-[11px] text-slate-500">เพื่อยืนยันว่าคุณไม่ใช่บอท</p>
                        </div>
                    </div>
                    <input type="number" id="captchaAnswer" required 
                           class="modern-input block w-20 px-3 py-2 bg-white border border-slate-200 rounded-lg text-center text-slate-800 placeholder-slate-300 outline-none" 
                           placeholder="คำตอบ">
                </div>

                <!-- Submit Button -->
                <div class="pt-4">
                    <button type="submit" id="submitBtn" 
                            class="group relative w-full inline-flex items-center justify-center bg-slate-900 hover:bg-indigo-600 text-white font-medium py-3.5 px-6 rounded-xl transition-all duration-200 active:scale-[0.98]">
                        <span id="btnText" class="text-base">ส่งข้อมูล</span>
                        <i data-lucide="arrow-right" id="btnIcon" class="w-4 h-4 ml-2 group-hover:translate-x-1 transition-transform"></i>
                        <div class="loader ml-2" id="btnLoader"></div>
                    </button>
                    <p class="text-center text-xs text-slate-400 mt-4">
                        ข้อมูลของคุณจะถูกเก็บเป็นความลับและใช้เพื่อการติดต่อกลับเท่านั้น
                    </p>
                </div>
            </form>
        </div>
    </div>

    <script>
        // กำหนดไอคอน Lucide
        lucide.createIcons();

        // URL ของ Google Apps Script ที่ถูกต้อง
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxoupHfxfH3x6pvItELVW2wIXXTBi2zJi-1i3H9-7M_ZM5FxUJa64ITXItaTODl5-xKYw/exec";

        // ตัวแปรและฟังก์ชันสำหรับระบบป้องกันบอท (CAPTCHA)
        let expectedCaptchaAnswer = 0;
        function generateCaptcha() {
            const num1 = Math.floor(Math.random() * 9) + 1;
            const num2 = Math.floor(Math.random() * 9) + 1;
            expectedCaptchaAnswer = num1 + num2;
            document.getElementById('captchaQuestion').innerText = `บวกเลข: ${num1} + ${num2} = ?`;
            document.getElementById('captchaAnswer').value = '';
        }
        
        // สร้าง CAPTCHA ครั้งแรก
        window.addEventListener('DOMContentLoaded', generateCaptcha);

        // ฟังก์ชันแสดงคำแนะนำการใช้งาน
        function showGuide() {
            Swal.fire({
                title: '<span class="text-xl font-bold">ขั้นตอนการติดต่อ</span>',
                html: `
                    <div class="text-left space-y-4 mt-4">
                        <div class="flex gap-4 p-4 rounded-xl bg-slate-50 border border-slate-100">
                            <div class="w-8 h-8 rounded-full bg-white border border-slate-200 shadow-sm flex items-center justify-center font-bold text-slate-600 shrink-0">1</div>
                            <div>
                                <p class="font-medium text-slate-800 text-sm">กรอกข้อมูลให้ครบถ้วน</p>
                                <p class="text-xs text-slate-500 mt-1">ระบุชื่อ อีเมล หัวข้อ และรายละเอียดปัญหาให้ชัดเจน</p>
                            </div>
                        </div>
                        <div class="flex gap-4 p-4 rounded-xl bg-slate-50 border border-slate-100">
                            <div class="w-8 h-8 rounded-full bg-white border border-slate-200 shadow-sm flex items-center justify-center font-bold text-slate-600 shrink-0">2</div>
                            <div>
                                <p class="font-medium text-slate-800 text-sm">ยืนยันตัวตนและส่งข้อความ</p>
                                <p class="text-xs text-slate-500 mt-1">บวกเลขป้องกันบอทและกดปุ่ม 'ส่งข้อมูล'</p>
                            </div>
                        </div>
                        <div class="flex gap-4 p-4 rounded-xl bg-indigo-50 border border-indigo-100">
                            <div class="w-8 h-8 rounded-full bg-white border border-indigo-200 shadow-sm flex items-center justify-center font-bold text-indigo-600 shrink-0">3</div>
                            <div>
                                <p class="font-medium text-indigo-900 text-sm">รอรับการติดต่อกลับ</p>
                                <p class="text-xs text-indigo-700/80 mt-1">ระบบจะส่งอีเมลยืนยัน (Ticket ID) ให้คุณทันที ทีมงานจะตรวจสอบและติดต่อกลับภายใน 3-7 วัน</p>
                            </div>
                        </div>
                    </div>
                `,
                showCloseButton: true,
                showConfirmButton: false,
                customClass: {
                    popup: 'rounded-3xl w-[90%] max-w-md p-6'
                }
            });
        }

        // จัดการเหตุการณ์เมื่อกดส่งฟอร์ม
        document.getElementById('contactForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // 1. ตรวจสอบ Honeypot
            if (document.getElementById('honeypot').value !== '') return;

            // 2. ตรวจสอบ Math CAPTCHA
            const userAnswer = parseInt(document.getElementById('captchaAnswer').value);
            if (userAnswer !== expectedCaptchaAnswer) {
                Swal.fire({
                    title: 'ผลลัพธ์ไม่ถูกต้อง',
                    text: 'กรุณาคำนวณผลลัพธ์การบวกเลขใหม่อีกครั้งครับ',
                    icon: 'warning',
                    confirmButtonColor: '#0f172a',
                    confirmButtonText: 'ตกลง',
                    customClass: {
                        popup: 'rounded-3xl w-[90%] max-w-sm',
                        confirmButton: 'rounded-xl px-8 py-2.5 font-medium w-full'
                    }
                });
                generateCaptcha();
                return;
            }

            // UI Loading state
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const btnLoader = document.getElementById('btnLoader');

            btn.disabled = true;
            btn.classList.add('opacity-90', 'cursor-not-allowed');
            btnText.textContent = "กำลังดำเนินการ...";
            btnIcon.style.display = 'none';
            btnLoader.style.display = 'block';

            // จัดเตรียมข้อมูล
            const payload = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                subject: document.getElementById('subject').value,
                priority: '-',
                description: document.getElementById('description').value
            };

            try {
                // ส่งไปยัง Backend
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'create', payload: payload })
                });

                // แสดงข้อความสำเร็จ
                Swal.fire({
                    title: 'ส่งข้อมูลสำเร็จ!',
                    text: 'ระบบได้รับข้อมูลของคุณเรียบร้อยแล้ว ทีมงานจะติดต่อกลับทางอีเมล',
                    icon: 'success',
                    confirmButtonColor: '#4f46e5',
                    confirmButtonText: 'ปิดหน้าต่าง',
                    customClass: {
                        popup: 'rounded-3xl w-[90%] max-w-sm',
                        confirmButton: 'rounded-xl px-8 py-2.5 font-medium w-full'
                    }
                });
                
                document.getElementById('contactForm').reset();
                generateCaptcha();

            } catch (error) {
                Swal.fire({
                    title: 'เกิดข้อผิดพลาด',
                    text: 'ไม่สามารถส่งข้อมูลได้ กรุณาลองใหม่อีกครั้ง',
                    icon: 'error',
                    confirmButtonColor: '#ef4444',
                    customClass: {
                        popup: 'rounded-3xl w-[90%] max-w-sm',
                        confirmButton: 'rounded-xl px-8 py-2.5 font-medium w-full'
                    }
                });
            } finally {
                // คืนสถานะปุ่ม
                btn.disabled = false;
                btn.classList.remove('opacity-90', 'cursor-not-allowed');
                btnText.textContent = "ส่งข้อมูล";
                btnIcon.style.display = 'block';
                btnLoader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
