<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helpdesk Support (User)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ซ่อนฟิลด์ดักจับบอท (Honeypot) แบบไม่ให้มีผลกระทบกับ Layout */
        .bot-trap { position: absolute; left: -9999px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Header -->
    <header class="bg-[#3B82F6] text-white py-4 px-6 shadow-sm">
        <div class="max-w-6xl mx-auto flex items-center">
            <i class="fas fa-ticket-alt text-2xl mr-3"></i>
            <h1 class="text-xl font-bold">Helpdesk Support (User)</h1>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto p-4 md:p-6 mt-4 md:mt-8 grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- Column 1: เปิด Ticket ใหม่ -->
        <div class="bg-white p-6 md:p-8 rounded-xl shadow-sm border border-gray-100 h-fit">
            <h2 class="text-xl font-bold text-[#1E3A8A] flex items-center mb-6">
                <i class="fas fa-paper-plane mr-2 text-[#3B82F6]"></i> เปิด Ticket ใหม่
            </h2>

            <form id="ticketForm" class="space-y-4">
                
                <!-- ฟิลด์ดัก Spam (Honeypot) - บอทมักจะพยายามกรอกฟิลด์นี้ -->
                <input type="text" id="websiteHoneypot" name="website" class="bot-trap" tabindex="-1" autocomplete="off">

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">อีเมลของคุณ</label>
                    <input type="email" id="email" required placeholder="example@email.com" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">หัวข้อเรื่อง</label>
                    <input type="text" id="subject" required placeholder="เช่น พบปัญหาระบบ..." class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">รายละเอียด</label>
                    <textarea id="details" rows="5" required placeholder="อธิบายปัญหาหรือข้อสงสัยของคุณ..." class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition resize-none"></textarea>
                </div>

                <!-- ระบบตรวจสอบ Captcha -->
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                    <label class="block text-sm font-bold text-gray-700 mb-2">ยืนยันว่าคุณไม่ใช่บอท</label>
                    <div class="flex items-center space-x-3">
                        <span id="captchaQuestion" class="font-mono text-lg font-bold bg-white px-3 py-1 rounded border">? + ? =</span>
                        <input type="number" id="captchaAnswer" required placeholder="ใส่ผลลัพธ์" class="w-24 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <p id="captchaError" class="text-red-500 text-xs mt-1 hidden">ผลบวกไม่ถูกต้อง กรุณาลองใหม่</p>
                </div>

                <div class="pt-2">
                    <button type="submit" id="submitBtn" class="w-full bg-[#3B82F6] hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 flex justify-center items-center shadow-sm">
                        <span id="btnText">ส่งข้อความติดต่อ</span>
                        <i id="btnSpinner" class="fas fa-circle-notch fa-spin ml-2 hidden"></i>
                    </button>
                </div>
            </form>

            <div id="successMessage" class="hidden mt-6 p-4 bg-green-50 text-green-700 rounded-lg border border-green-200 text-center text-sm">
                <i class="fas fa-check-circle text-2xl mb-2 block text-green-500"></i>
                ส่ง Ticket สำเร็จ! ระบบได้ส่งอีเมลยืนยันไปยังอีเมลของคุณแล้ว
                <button onclick="resetForm()" class="mt-4 text-blue-600 underline text-sm block mx-auto">ส่งข้อความใหม่</button>
            </div>
        </div>

        <!-- Column 2: ติดตามสถานะ Ticket -->
        <div class="bg-white p-6 md:p-8 rounded-xl shadow-sm border border-gray-100 h-fit">
            <h2 class="text-xl font-bold text-[#1E3A8A] flex items-center mb-6">
                <i class="fas fa-search mr-2"></i> ติดตามสถานะ Ticket
            </h2>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">ค้นหาด้วยอีเมลของคุณ</label>
                <div class="flex flex-col sm:flex-row space-y-2 sm:space-y-0 sm:space-x-2">
                    <input type="email" id="searchEmail" placeholder="กรอกอีเมลเพื่อดูประวัติ" class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-800 outline-none transition">
                    <button onclick="searchTickets()" id="searchBtn" class="bg-[#1F2937] hover:bg-gray-900 text-white px-6 py-3 rounded-lg font-bold transition flex justify-center items-center whitespace-nowrap">
                        <i class="fas fa-search mr-2" id="searchIcon"></i>
                        <i class="fas fa-circle-notch fa-spin mr-2 hidden" id="searchSpinner"></i>
                        ค้นหา
                    </button>
                </div>
            </div>

            <!-- พื้นที่แสดงผลการค้นหา -->
            <div id="searchResults" class="mt-6 space-y-3">
                <!-- ผลลัพธ์จะถูกแทรกที่นี่ -->
            </div>
        </div>

    </main>

    <!-- Popup Modal สำหรับแจ้งเตือนส่งสำเร็จ -->
    <div id="popupModal" class="fixed inset-0 flex items-center justify-center z-50 hidden">
        <!-- Overlay -->
        <div class="absolute inset-0 bg-black bg-opacity-50 backdrop-blur-sm transition-opacity" onclick="closePopup()"></div>
        <!-- Modal Content -->
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full mx-4 relative z-10 transform scale-95 opacity-0 transition-all duration-300" id="popupContent">
            <div class="text-center">
                <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-5 shadow-inner">
                    <i class="fas fa-check text-4xl text-green-500"></i>
                </div>
                <h3 class="text-2xl font-bold text-gray-800 mb-2">ส่งข้อมูลสำเร็จ!</h3>
                <p class="text-gray-600 text-sm mb-6">ระบบได้รับ Ticket ของคุณแล้ว และได้ส่งอีเมลยืนยันไปยังอีเมลของคุณเรียบร้อยแล้ว</p>
                <button onclick="closePopup()" class="w-full bg-[#3B82F6] hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition duration-200 shadow-md">
                    ตกลง
                </button>
            </div>
        </div>
    </div>

    <script>
        // *** นำ URL ของ Web App จาก Google Apps Script มาใส่ที่นี่ ***
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyqLRrZFI1QlvC6wAkaNliuKzPiWTEYFn1OEDMlb2za-wpUzp_zAGL6iig4JLNxDaISsw/exec';
        
        let captchaResult = 0;

        // ฟังก์ชันสร้างโจทย์ Captcha ใหม่เมื่อโหลดหน้าจอ
        function generateCaptcha() {
            const num1 = Math.floor(Math.random() * 10) + 1;
            const num2 = Math.floor(Math.random() * 10) + 1;
            captchaResult = num1 + num2;
            document.getElementById('captchaQuestion').innerText = `${num1} + ${num2} =`;
            document.getElementById('captchaAnswer').value = '';
        }

        window.onload = generateCaptcha;

        // จัดการฟอร์มส่งข้อมูล (พร้อม Anti-Spam)
        document.getElementById('ticketForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // 1. ตรวจสอบ Honeypot (บอทมักจะกรอกข้อมูลลงช่องที่ซ่อนไว้)
            if (document.getElementById('websiteHoneypot').value !== "") {
                alert("ระบบตรวจพบสแปม!");
                return;
            }

            // 2. ตรวจสอบ Math Captcha
            const userAnswer = parseInt(document.getElementById('captchaAnswer').value);
            if (userAnswer !== captchaResult) {
                document.getElementById('captchaError').classList.remove('hidden');
                generateCaptcha();
                return;
            }
            document.getElementById('captchaError').classList.add('hidden');

            // 3. Rate Limiting (จำกัด 1 ครั้งต่อ 60 วินาที)
            const lastSubmit = localStorage.getItem('lastTicketSubmit');
            const now = new Date().getTime();
            if (lastSubmit && (now - lastSubmit) < 60000) {
                alert("คุณส่งข้อมูลบ่อยเกินไป กรุณารอสักครู่ (60 วินาที) แล้วลองใหม่");
                return;
            }
            
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('btnSpinner');
            
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');
            btnText.innerText = 'กำลังส่งข้อมูล...';
            spinner.classList.remove('hidden');

            const payload = {
                action: 'create_ticket',
                email: document.getElementById('email').value,
                subject: document.getElementById('subject').value,
                details: document.getElementById('details').value
            };

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });

                const result = await response.json();

                if (result.status === 'success') {
                    // บันทึกเวลาที่ส่งล่าสุด
                    localStorage.setItem('lastTicketSubmit', now.toString());
                    
                    document.getElementById('ticketForm').classList.add('hidden');
                    document.getElementById('successMessage').classList.remove('hidden');

                    // แสดง Popup เมื่อส่งสำเร็จ
                    showPopup();
                } else {
                    alert('เกิดข้อผิดพลาด: ' + result.message);
                }
            } catch (error) {
                alert('ไม่สามารถเชื่อมต่อกับระบบได้ กรุณาลองใหม่');
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
                btnText.innerText = 'ส่งข้อความติดต่อ';
                spinner.classList.add('hidden');
            }
        });

        // ฟังก์ชันติดตามสถานะ Ticket
        async function searchTickets() {
            const email = document.getElementById('searchEmail').value;
            const resultsContainer = document.getElementById('searchResults');
            
            if (!email) {
                alert("กรุณากรอกอีเมลที่ใช้แจ้งเรื่อง");
                return;
            }

            const btn = document.getElementById('searchBtn');
            const icon = document.getElementById('searchIcon');
            const spinner = document.getElementById('searchSpinner');

            btn.disabled = true;
            icon.classList.add('hidden');
            spinner.classList.remove('hidden');
            resultsContainer.innerHTML = '<p class="text-center text-gray-500 py-4">กำลังค้นหาข้อมูล...</p>';

            try {
                const payload = { action: 'get_user_tickets', email: email };
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });

                const result = await response.json();
                
                if (result.status === 'success') {
                    displaySearchResults(result.data);
                } else {
                    resultsContainer.innerHTML = `<p class="text-center text-red-500 py-4">เกิดข้อผิดพลาด: ${result.message}</p>`;
                }
            } catch (error) {
                resultsContainer.innerHTML = '<p class="text-center text-red-500 py-4">ไม่สามารถดึงข้อมูลได้</p>';
            } finally {
                btn.disabled = false;
                icon.classList.remove('hidden');
                spinner.classList.add('hidden');
            }
        }

        function displaySearchResults(tickets) {
            const container = document.getElementById('searchResults');
            container.innerHTML = '';

            if (tickets.length === 0) {
                container.innerHTML = `
                    <div class="bg-gray-50 p-4 rounded-lg text-center text-gray-500 border border-gray-200">
                        ไม่พบประวัติ Ticket ของอีเมลนี้
                    </div>`;
                return;
            }

            tickets.forEach(ticket => {
                let dateStr = new Date(ticket.date).toLocaleDateString('th-TH');
                
                let statusBadge = '';
                if (ticket.status === 'รอรับเรื่อง') statusBadge = '<span class="bg-yellow-100 text-yellow-800 text-xs px-2 py-1 rounded-full">รอรับเรื่อง</span>';
                if (ticket.status === 'กำลังดำเนินการ') statusBadge = '<span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-full">กำลังดำเนินการ</span>';
                if (ticket.status === 'ปิดงาน') statusBadge = '<span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded-full">ปิดงานแล้ว</span>';

                container.innerHTML += `
                    <div class="p-4 border border-gray-200 rounded-lg hover:shadow-sm transition bg-gray-50">
                        <div class="flex justify-between items-start mb-2">
                            <span class="font-mono text-sm text-gray-500">${ticket.id}</span>
                            ${statusBadge}
                        </div>
                        <h3 class="font-bold text-gray-800 text-sm mb-1">${ticket.subject}</h3>
                        <p class="text-xs text-gray-500"><i class="far fa-calendar-alt mr-1"></i> ${dateStr}</p>
                    </div>
                `;
            });
        }

        // ฟังก์ชันควบคุมการแสดง Popup
        function showPopup() {
            const modal = document.getElementById('popupModal');
            const content = document.getElementById('popupContent');
            modal.classList.remove('hidden');
            
            // บังคับให้เบราว์เซอร์วาด UI ใหม่ก่อนใส่แอนิเมชัน
            void modal.offsetWidth;
            
            content.classList.remove('scale-95', 'opacity-0');
            content.classList.add('scale-100', 'opacity-100');
        }

        function closePopup() {
            const modal = document.getElementById('popupModal');
            const content = document.getElementById('popupContent');
            
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            
            // รอแอนิเมชันจบแล้วค่อยซ่อน
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function resetForm() {
            document.getElementById('ticketForm').reset();
            document.getElementById('ticketForm').classList.remove('hidden');
            document.getElementById('successMessage').classList.add('hidden');
            generateCaptcha();
        }
    </script>
</body>
</html>
