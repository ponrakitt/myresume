<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helpdesk Support - ฝั่งผู้ใช้งาน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-blue-600 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2 text-xl font-bold">
                <i class="fa-solid fa-ticket"></i>
                <span>Helpdesk Support (User)</span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 py-8">
        <div class="grid md:grid-cols-2 gap-8">
            
            <!-- ส่วนฟอร์มเปิด Ticket -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold mb-6 flex items-center text-blue-800">
                    <i class="fa-solid fa-paper-plane mr-2"></i> เปิด Ticket ใหม่
                </h2>
                <form id="ticket-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">อีเมลของคุณ</label>
                        <input type="email" id="userEmail" required class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="example@email.com">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">หัวข้อเรื่อง</label>
                        <input type="text" id="subject" required class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="เช่น พบปัญหาระบบ...">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">รายละเอียด</label>
                        <textarea id="message" required rows="4" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="อธิบายปัญหาหรือข้อสงสัยของคุณ..."></textarea>
                    </div>
                    <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition-colors flex justify-center items-center">
                        ส่งข้อความติดต่อ
                    </button>
                </form>
            </div>

            <!-- ส่วนติดตามสถานะ -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold mb-6 flex items-center text-gray-800">
                    <i class="fa-solid fa-magnifying-glass mr-2"></i> ติดตามสถานะ Ticket
                </h2>
                <form id="search-form" class="mb-6 flex gap-2">
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-gray-700 mb-1">ค้นหาด้วยอีเมลของคุณ</label>
                        <input type="email" id="searchEmail" required class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="กรอกอีเมลเพื่อดูประวัติ">
                    </div>
                    <div class="flex items-end">
                        <button type="submit" id="search-btn" class="bg-gray-800 hover:bg-gray-900 text-white px-4 py-2.5 rounded-lg transition-colors flex items-center">
                            <i class="fa-solid fa-search mr-2"></i> ค้นหา
                        </button>
                    </div>
                </form>
                
                <div id="loading-indicator" class="text-center py-4 text-gray-500 hidden">
                    <i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังโหลดข้อมูล...
                </div>

                <div id="ticket-list" class="space-y-4 max-h-[400px] overflow-y-auto pr-2">
                    <!-- ข้อมูล Ticket จะถูกแสดงที่นี่ -->
                </div>
            </div>

        </div>
    </main>

    <script>
        // ใส่ Web App URL ลงในโค้ดแล้ว
        const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbylchiw4HjzE7XG7P2yZuYV74nyCzYi965Q22J7PHy6cDu3Hhq_zae5f16tzBji4fMMgw/exec'; 
        
        let tickets = [];

        window.onload = () => {
            document.getElementById('ticket-form').addEventListener('submit', handleCreateTicket);
            document.getElementById('search-form').addEventListener('submit', handleSearchTickets);
        };

        // ฟังก์ชันแสดง Toast Notification
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-green-600' : type === 'error' ? 'bg-red-600' : 'bg-blue-600';
            toast.className = `fixed bottom-4 right-4 text-white px-6 py-3 rounded-lg shadow-lg transition-all duration-300 transform translate-y-10 opacity-0 z-50 ${bgColor}`;
            toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'} mr-2"></i> ${message}`;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.classList.remove('translate-y-10', 'opacity-0'), 10);
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ค้นหาประวัติด้วยอีเมล
        async function handleSearchTickets(e) {
            e.preventDefault();
            const searchEmail = document.getElementById('searchEmail').value.trim();
            const btn = document.getElementById('search-btn');
            
            document.getElementById('loading-indicator').classList.remove('hidden');
            document.getElementById('ticket-list').innerHTML = '';
            btn.disabled = true;

            try {
                const response = await fetch(`${GAS_WEB_APP_URL}?action=get_by_email&email=${encodeURIComponent(searchEmail)}`);
                tickets = await response.json();
                renderTickets(tickets);
            } catch (error) {
                console.error('Error fetching tickets:', error);
                showToast('ไม่สามารถดึงข้อมูลได้', 'error');
            }
            
            document.getElementById('loading-indicator').classList.add('hidden');
            btn.disabled = false;
        }

        // วาด UI รายการ Ticket
        function renderTickets(ticketsData) {
            const listContainer = document.getElementById('ticket-list');
            listContainer.innerHTML = '';

            if (ticketsData.length === 0) {
                listContainer.innerHTML = '<p class="text-center text-gray-500 py-4">ไม่พบประวัติการติดต่อของอีเมลนี้</p>';
                return;
            }

            ticketsData.forEach(ticket => {
                const statusHtml = ticket.status === 'Open' 
                    ? `<span class="flex items-center text-xs font-medium text-orange-600 bg-orange-100 px-2 py-1 rounded-full"><i class="fa-regular fa-clock mr-1"></i> รอดำเนินการ</span>`
                    : `<span class="flex items-center text-xs font-medium text-green-600 bg-green-100 px-2 py-1 rounded-full"><i class="fa-solid fa-check-circle mr-1"></i> ปิดแล้ว</span>`;

                const adminReplyHtml = ticket.status === 'Closed' && ticket.adminReply ? `
                    <div class="mt-3 bg-blue-50 p-3 rounded-md border border-blue-100">
                        <p class="text-xs font-semibold text-blue-800 mb-1">Admin ตอบกลับ (${ticket.replyTimestamp}):</p>
                        <p class="text-sm text-gray-800">${ticket.adminReply.replace(/\n/g, '<br>')}</p>
                    </div>
                ` : '';

                const cardHtml = `
                    <div class="border border-gray-200 rounded-lg p-4 hover:bg-gray-50 transition-colors">
                        <div class="flex justify-between items-start mb-2">
                            <span class="font-semibold text-blue-700">${ticket.id}</span>
                            ${statusHtml}
                        </div>
                        <h3 class="font-medium text-gray-900 mb-1">${ticket.subject}</h3>
                        <p class="text-sm text-gray-600 line-clamp-2 mb-3">${ticket.message}</p>
                        ${adminReplyHtml}
                        <div class="text-xs text-gray-400 mt-2 text-right">${ticket.timestamp}</div>
                    </div>
                `;
                listContainer.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        // เปิด Ticket ใหม่
        async function handleCreateTicket(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังส่งข้อมูล...';
            btn.disabled = true;

            const newTicket = {
                action: 'create',
                email: document.getElementById('userEmail').value,
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value
            };

            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify(newTicket),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                const result = await response.json();
                
                if (result.success) {
                    showToast('เปิด Ticket สำเร็จ! ตรวจสอบที่อีเมลของคุณ');
                    document.getElementById('searchEmail').value = newTicket.email;
                    document.getElementById('subject').value = '';
                    document.getElementById('message').value = '';
                    
                    // ดึงข้อมูลมาแสดงทันที
                    document.getElementById('search-btn').click();
                } else {
                    console.error('Server Error:', result.error);
                    showToast('เซิร์ฟเวอร์ปฏิเสธการทำงาน: ' + result.error, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('เกิดข้อผิดพลาดในการส่งข้อมูล โปรดลองใหม่', 'error');
            }
            
            btn.innerHTML = 'ส่งข้อความติดต่อ';
            btn.disabled = false;
        }
    </script>
</body>
</html>
