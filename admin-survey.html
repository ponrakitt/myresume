<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanflorist - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f7f5f2; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        .tab-btn.active { color: #c19b84; border-bottom: 2px solid #c19b84; font-weight: 500; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 py-10">

    <div class="w-full max-w-2xl bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
        
        <!-- Header & Tabs -->
        <div class="bg-[#fdfaf8] border-b border-[#e6dcd5] p-6 text-center">
            <h1 class="text-2xl sm:text-3xl font-medium text-[#c19b84] mb-4">Admin Dashboard</h1>
            <div class="flex justify-center space-x-6">
                <button onclick="switchTab('linkTab')" id="btn-linkTab" class="tab-btn active pb-2 text-gray-500 hover:text-[#c19b84] transition">สร้างลิงก์แบบสอบถาม</button>
                <button onclick="switchTab('settingTab')" id="btn-settingTab" class="tab-btn pb-2 text-gray-500 hover:text-[#c19b84] transition">ตั้งค่าคำถาม & หัวข้อ</button>
            </div>
        </div>

        <div class="p-6 sm:p-8">
            <!-- TAB 1: Generate Link -->
            <div id="linkTab" class="tab-content active">
                <form id="adminForm" class="space-y-5 max-w-md mx-auto">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">อีเมลลูกค้า หรือ ชื่ออ้างอิง</label>
                        <input type="text" id="targetEmail" class="w-full border-2 border-gray-100 bg-gray-50 rounded-xl p-3 focus:outline-none focus:border-[#c19b84] transition-colors" placeholder="เช่น customer@email.com หรือ คุณเอ">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">อายุการใช้งานของลิงก์</label>
                        <select id="expireHours" class="w-full border-2 border-gray-100 bg-gray-50 rounded-xl p-3 focus:outline-none focus:border-[#c19b84] transition-colors text-gray-700">
                            <option value="0">ไม่มีหมดอายุ (จนกว่าจะถูกใช้)</option>
                            <option value="1">1 ชั่วโมง</option>
                            <option value="24">24 ชั่วโมง (1 วัน)</option>
                            <option value="72">3 วัน</option>
                            <option value="168">7 วัน</option>
                        </select>
                    </div>
                    <button type="submit" id="genBtn" class="w-full py-3 rounded-xl text-white font-medium shadow-sm transition-all bg-[#c19b84] hover:bg-[#b08b76]">
                        สร้างลิงก์ (Generate Link)
                    </button>
                </form>

                <div id="resultBox" class="hidden mt-8 p-5 bg-[#fdfaf8] border border-[#e6dcd5] rounded-xl text-center max-w-md mx-auto">
                    <p class="text-sm text-gray-600 mb-2">ลิงก์ของคุณพร้อมแล้ว ส่งให้ลูกค้าได้เลย:</p>
                    <input type="text" id="generatedLink" class="w-full text-xs text-gray-500 bg-white border border-gray-200 rounded p-2 mb-3 text-center" readonly>
                    <p id="expireText" class="text-xs text-red-400 mb-3 font-medium"></p>
                    <button onclick="copyLink()" id="copyBtn" class="px-4 py-2 bg-gray-800 text-white text-sm rounded-lg hover:bg-gray-700 w-full">คัดลอกลิงก์ (Copy Link)</button>
                </div>
            </div>

            <!-- TAB 2: Settings -->
            <div id="settingTab" class="tab-content">
                <form id="settingForm" class="space-y-6">
                    <!-- Title Section -->
                    <div class="bg-gray-50 p-5 rounded-2xl border border-gray-100">
                        <h3 class="font-medium text-gray-800 mb-4 border-b pb-2">ตั้งค่าหัวข้อแบบสอบถาม (Header)</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">หัวข้อรอง (ภาษาไทย)</label>
                                <input type="text" id="cfg_th_sub" required class="w-full border border-gray-200 rounded-lg p-2 text-sm focus:border-[#c19b84] focus:outline-none">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">หัวข้อรอง (English)</label>
                                <input type="text" id="cfg_en_sub" required class="w-full border border-gray-200 rounded-lg p-2 text-sm focus:border-[#c19b84] focus:outline-none">
                            </div>
                        </div>
                    </div>

                    <!-- Questions Section (Generated by JS) -->
                    <div class="bg-gray-50 p-5 rounded-2xl border border-gray-100">
                        <h3 class="font-medium text-gray-800 mb-4 border-b pb-2">ตั้งค่าคำถาม (Questions 1-10)</h3>
                        <div id="questionsConfigArea" class="space-y-4"></div>
                    </div>

                    <button type="submit" id="saveCfgBtn" class="w-full py-3 rounded-xl text-white font-medium shadow-sm transition-all bg-gray-800 hover:bg-gray-700">
                        บันทึกการตั้งค่าทั้งหมด (Save Settings)
                    </button>
                    <p id="saveMsg" class="text-green-600 text-center text-sm hidden mt-2">บันทึกข้อมูลเรียบร้อยแล้ว!</p>
                </form>
            </div>
        </div>
    </div>

    <script>
        // 🔴 ใส่ URL ของ Google Apps Script (ตัวเดียวกับที่ใส่ใน survey.html)
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzCL_VYErxDPgAERCPfIcT9L3D9EJCT-YOEFGKa_4pXo5cTEnrOpykdx_t8BXfMsqHe/exec';
        const FRONTEND_URL = 'https://ponrakitt.site/Satisfaction-survey.html';

        // --- UI Logic ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
        }

        // --- Generate Admin Setting Inputs ---
        const qArea = document.getElementById('questionsConfigArea');
        for (let i = 1; i <= 10; i++) {
            qArea.innerHTML += `
                <div class="border border-gray-200 bg-white p-3 rounded-xl">
                    <p class="text-sm font-medium text-[#c19b84] mb-2">ข้อที่ ${i} ${i <= 8 ? '(ให้คะแนน)' : '(พิมพ์ข้อความ)'}</p>
                    <div class="space-y-2">
                        <input type="text" id="cfg_th_q${i}" placeholder="ภาษาไทย..." required class="w-full border border-gray-200 rounded-lg p-2 text-sm focus:border-[#c19b84] focus:outline-none">
                        <input type="text" id="cfg_en_q${i}" placeholder="English..." required class="w-full border border-gray-200 rounded-lg p-2 text-sm focus:border-[#c19b84] focus:outline-none">
                    </div>
                </div>
            `;
        }

        // --- Fetch Current Config on Load ---
        fetch(SCRIPT_URL + '?action=getConfig')
            .then(res => res.json())
            .then(data => {
                // ถ้ามีข้อมูลที่เคยเซฟไว้
                if(data.th_sub) {
                    document.getElementById('cfg_th_sub').value = data.th_sub;
                    document.getElementById('cfg_en_sub').value = data.en_sub;
                    for (let i = 1; i <= 10; i++) {
                        document.getElementById(`cfg_th_q${i}`).value = data.th_q[i-1];
                        document.getElementById(`cfg_en_q${i}`).value = data.en_q[i-1];
                    }
                } else {
                    // Default values (ครั้งแรก)
                    document.getElementById('cfg_th_sub').value = "แบบประเมินความพึงพอใจและข้อเสนอแนะ";
                    document.getElementById('cfg_en_sub').value = "Customer Satisfaction Survey";
                    const def_th = ["1. ความพึงพอใจในคุณภาพและความสดของดอกไม้", "2. ความสวยงามและความคิดสร้างสรรค์ของการจัดดอกไม้", "3. ความตรงต่อเวลาในการจัดส่งสินค้า", "4. ความสุภาพและการให้บริการของพนักงาน", "5. ความคุ้มค่าของราคาเมื่อเทียบกับคุณภาพ", "6. ความสะดวกและง่ายดายในการสั่งซื้อสินค้า", "7. ความถูกต้องของสินค้าที่ได้รับตรงตามที่สั่ง", "8. ความพึงพอใจในภาพรวมต่อร้าน Wanflorist", "9. สิ่งที่คุณประทับใจที่สุดในการใช้บริการครั้งนี้", "10. ข้อเสนอแนะเพิ่มเติมเพื่อการพัฒนา (ถ้ามี)"];
                    const def_en = ["1. Satisfaction with the quality and freshness of the flowers", "2. Beauty and creativity of the floral arrangement", "3. Punctuality of the delivery", "4. Politeness and service of the staff", "5. Value for money compared to quality", "6. Convenience and ease of ordering", "7. Accuracy of the received products as ordered", "8. Overall satisfaction with Wanflorist", "9. What impressed you the most about our service?", "10. Additional suggestions for improvement (if any)"];
                    for (let i = 1; i <= 10; i++) {
                        document.getElementById(`cfg_th_q${i}`).value = def_th[i-1];
                        document.getElementById(`cfg_en_q${i}`).value = def_en[i-1];
                    }
                }
            });

        // --- Save Config ---
        document.getElementById('settingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('saveCfgBtn');
            btn.innerText = 'กำลังบันทึก...';
            
            // รวบรวมข้อมูล
            let configData = {
                th_sub: document.getElementById('cfg_th_sub').value,
                en_sub: document.getElementById('cfg_en_sub').value,
                th_q: [], en_q: []
            };
            for (let i = 1; i <= 10; i++) {
                configData.th_q.push(document.getElementById(`cfg_th_q${i}`).value);
                configData.en_q.push(document.getElementById(`cfg_en_q${i}`).value);
            }

            const formData = new URLSearchParams();
            formData.append('action', 'saveConfig');
            formData.append('configData', JSON.stringify(configData));

            fetch(SCRIPT_URL, { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                btn.innerText = 'บันทึกการตั้งค่าทั้งหมด (Save Settings)';
                const msg = document.getElementById('saveMsg');
                msg.classList.remove('hidden');
                setTimeout(() => msg.classList.add('hidden'), 3000);
            })
            .catch(err => alert("Error: " + err));
        });

        // --- Generate Link Logic (จากของเดิม) ---
        document.getElementById('adminForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('genBtn');
            const email = document.getElementById('targetEmail').value;
            const expireHours = document.getElementById('expireHours').value;
            
            btn.innerText = 'กำลังสร้าง...';
            btn.disabled = true;

            const formData = new URLSearchParams();
            formData.append('action', 'generateToken');
            formData.append('targetEmail', email);
            formData.append('expireHours', expireHours);

            fetch(SCRIPT_URL, { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                btn.innerText = 'สร้างลิงก์ (Generate Link)';
                btn.disabled = false;
                if(data.success) {
                    const finalUrl = FRONTEND_URL + '?token=' + data.token;
                    document.getElementById('generatedLink').value = finalUrl;
                    document.getElementById('expireText').innerText = data.expireAt === "ไม่มีหมดอายุ" ? "* ลิงก์นี้ไม่มีวันหมดอายุ" : `* ลิงก์นี้จะหมดอายุในวันที่: ${data.expireAt}`;
                    document.getElementById('resultBox').classList.remove('hidden');
                    document.getElementById('copyBtn').innerText = 'คัดลอกลิงก์ (Copy Link)';
                    document.getElementById('copyBtn').classList.replace('bg-green-600', 'bg-gray-800');
                }
            });
        });

        function copyLink() {
            const copyText = document.getElementById("generatedLink");
            copyText.select(); document.execCommand("copy");
            const btn = document.getElementById('copyBtn');
            btn.innerText = 'คัดลอกสำเร็จแล้ว!';
            btn.classList.replace('bg-gray-800', 'bg-green-600');
        }
    </script>
</body>
</html>
