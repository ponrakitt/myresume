<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบยืนยันตัวตน (e-KYC) - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 50; }
        .toast { background: #333; color: white; padding: 12px 24px; border-radius: 8px; margin-top: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: opacity 0.3s; }
    </style>
</head>
<body class="text-gray-800 h-screen flex flex-col">

    <div id="toast-container"></div>

    <!-- Navbar -->
    <nav class="bg-indigo-700 text-white p-4 shadow-md flex justify-between items-center z-10">
        <div class="font-bold text-xl"><i class="fas fa-user-shield mr-2"></i> ระบบจัดการ e-KYC (Admin)</div>
    </nav>

    <!-- Main Content -->
    <div class="flex-grow p-4 md:p-8 flex justify-center">
        <div class="bg-white p-6 rounded-xl shadow-lg w-full max-w-5xl h-fit">
            
            <div id="auth-loading" class="flex justify-center items-center py-10 text-gray-500">
                <div class="spinner w-8 h-8 mr-3 border-indigo-600"></div> กำลังเชื่อมต่อระบบ...
            </div>

            <div id="admin-content" class="hidden">
                <div class="flex flex-col sm:flex-row justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-indigo-700 mb-4 sm:mb-0"><i class="fas fa-list-alt mr-2"></i> รายการคำขอยืนยันตัวตน</h2>
                    <button onclick="adminGenerateKey()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-lg shadow font-bold transition">
                        <i class="fas fa-plus mr-1"></i> สร้าง Key ใหม่
                    </button>
                </div>
                
                <div class="overflow-x-auto border rounded-lg">
                    <table class="min-w-full bg-white text-sm sm:text-base">
                        <thead class="bg-gray-100 text-gray-700">
                            <tr>
                                <th class="py-3 px-4 text-left border-b w-1/4">รหัสยืนยัน (Key)</th>
                                <th class="py-3 px-4 text-left border-b w-1/3">ชื่อ - นามสกุล</th>
                                <th class="py-3 px-4 text-left border-b w-1/4">สถานะ</th>
                                <th class="py-3 px-4 text-center border-b">คัดลอก</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body">
                            <tr><td colspan="4" class="py-8 text-center text-gray-500">กำลังโหลดข้อมูล...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Google Sheets API Script -->
    <script>
        // นำ URL ที่ได้จากขั้นตอน Deploy ของ Google Apps Script มาวางที่นี่
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyoH9Oq_PsMDIW3HW3Ct4vwTnTiidFkU_rJu7SfVYib8mEQjlMZivosKfY3qEYmuWkP/exec'; 

        window.showToast = function(msg, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'error' ? 'bg-red-600' : 'bg-gray-800'}`;
            toast.innerHTML = msg;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        async function initApp() {
            document.getElementById('auth-loading').classList.add('hidden');
            document.getElementById('admin-content').classList.remove('hidden');
            fetchData();
            // ดึงข้อมูลอัปเดตจาก Sheets ทุกๆ 3 วินาที
            setInterval(fetchData, 3000);
        }

        async function fetchData() {
            if (SCRIPT_URL === 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL') {
                document.getElementById('admin-table-body').innerHTML = '<tr><td colspan="4" class="py-6 text-center text-red-500 font-bold">กรุณานำ Web App URL ของ Google Sheets มาใส่ในโค้ดตรง SCRIPT_URL ก่อนครับ</td></tr>';
                return;
            }

            try {
                const response = await fetch(SCRIPT_URL + '?action=getAll');
                const docs = await response.json();
                
                const tbody = document.getElementById('admin-table-body');

                if (!docs || docs.length === 0 || docs.error) {
                    tbody.innerHTML = '<tr><td colspan="4" class="py-6 text-center text-gray-500">ยังไม่มีข้อมูล Key ในระบบ</td></tr>';
                    return;
                }

                // สลับข้อมูลให้ใบล่าสุดอยู่ด้านบน
                docs.reverse();

                tbody.innerHTML = docs.map(d => {
                    const statusBadge = d.status === 'ยืนยันแล้ว' 
                        ? '<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold"><i class="fas fa-check mr-1"></i> ยืนยันแล้ว</span>'
                        : '<span class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-xs font-bold"><i class="fas fa-clock mr-1"></i> รอดำเนินการ</span>';
                    return `
                        <tr class="border-b hover:bg-gray-50 transition">
                            <td class="py-3 px-4 font-mono font-bold text-blue-600">${d.id}</td>
                            <td class="py-3 px-4 font-medium">${d.name}</td>
                            <td class="py-3 px-4">${statusBadge}</td>
                            <td class="py-3 px-4 text-center">
                                <button onclick="copyAdminKey('${d.id}')" class="text-gray-500 hover:text-indigo-600 transition p-2" title="คัดลอก Key">
                                    <i class="far fa-copy text-lg"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (error) {
                console.error(error);
            }
        }

        window.adminGenerateKey = async function() {
            if (SCRIPT_URL === 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL') {
                showToast("ยังไม่ได้ใส่ SCRIPT_URL", "error");
                return;
            }
            const randomStr = Math.random().toString(36).substring(2, 7).toUpperCase();
            const newKey = `KYC-${randomStr}`;
            
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'create', key: newKey })
                });
                
                if (!response.ok) {
                    throw new Error("HTTP Status " + response.status);
                }
                
                showToast(`สร้างรหัส ${newKey} สำเร็จ`);
                fetchData(); // สั่งรีเฟรชข้อมูลทันทีหลังจากสร้างเสร็จ
            } catch (err) {
                console.error("เกิดข้อผิดพลาดในการส่งข้อมูล:", err);
                showToast("ล้มเหลว: " + err.message + " (ตรวจสอบสิทธิ์การเข้าถึง Apps Script)", "error");
            }
        }

        window.copyAdminKey = function(key) {
            const el = document.createElement('textarea');
            el.value = key;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast(`คัดลอก ${key} แล้ว นำไปส่งให้ลูกค้าได้เลย`);
        }

        window.onload = initApp;
    </script>
</body>
</html>
