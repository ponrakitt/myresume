<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanflorist | Admin Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Prompt', 'sans-serif'] } } } }
    </script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-800 rounded-3xl shadow-2xl border border-slate-700 overflow-hidden">
        
        <!-- Header -->
        <div class="p-6 border-b border-slate-700 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-500/30">
                    <i class="fas fa-user-shield"></i>
                </div>
                <div>
                    <h1 class="text-white font-bold text-lg">Admin Center</h1>
                    <p class="text-slate-400 text-xs">KYC System Control</p>
                </div>
            </div>
            <div class="px-3 py-1 bg-green-500/20 text-green-400 rounded-full text-xs font-bold border border-green-500/30 flex items-center gap-2" id="netStatus">
                <div class="w-1.5 h-1.5 bg-green-400 rounded-full animate-pulse"></div> Online
            </div>
        </div>

        <div class="p-8 text-center space-y-6">
            
            <!-- AI Toggle Switch -->
            <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 flex justify-between items-center transition-colors duration-300" id="aiToggleBox">
                <div class="text-left">
                    <div class="text-white font-bold flex items-center gap-2">
                        <i class="fas fa-robot text-blue-400"></i> ระบบ AI ยืนยันตัวตน
                    </div>
                    <div class="text-xs text-slate-400 mt-1" id="aiStatusText">กำลังเชื่อมต่อข้อมูล...</div>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="aiToggleBtn" class="sr-only peer" onchange="toggleSystemStatus()" disabled>
                    <div class="w-14 h-7 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-green-500"></div>
                </label>
            </div>

            <hr class="border-slate-700">

            <!-- Key Generator -->
            <div class="text-left">
                <p class="text-slate-300 text-sm font-bold mb-2">สร้าง Access Key ให้ลูกค้า</p>
                <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 relative group mb-4">
                    <div id="keyDisplay" class="text-3xl font-mono font-bold text-white tracking-widest text-center">
                        WF-XXXX-XXXX
                    </div>
                    <button onclick="copyToClipboard()" id="copyBtn" class="absolute top-2 right-2 w-10 h-10 bg-slate-800 hover:bg-slate-700 rounded-xl text-slate-400 transition-colors flex items-center justify-center opacity-0 group-hover:opacity-100 disabled:opacity-0">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
                
                <button id="generateBtn" onclick="generateAndSaveKey()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-6 rounded-xl transition-all shadow-lg shadow-blue-600/30 flex items-center justify-center gap-2">
                    <i class="fas fa-magic"></i> สร้าง Key ใหม่
                </button>
                <div id="statusMsg" class="text-sm font-medium hidden text-center mt-4"></div>
            </div>

        </div>
    </div>

    <script>
        // ⚠️ เชื่อมต่อกับ Backend ผ่าน Web App URL ที่คุณให้มา
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz8nIFSonxBZ4kktOiiUzYf1HgXv-ON-FoIEKgJFG4bqOmortR_JBrP7Djp3edKLRHOXg/exec';
        let currentGeneratedKey = '';

        // โหลดสถานะตอนเปิดหน้าแอดมิน
        window.onload = async () => {
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    // นำ headers ออกเพื่อป้องกันปัญหา CORS Preflight ในบางเบราว์เซอร์
                    body: JSON.stringify({ action: 'get_status' })
                });
                const result = await response.json();
                updateToggleUI(result.ai_active);
                document.getElementById('aiToggleBtn').disabled = false;
            } catch(e) {
                document.getElementById('aiStatusText').innerText = "เชื่อมต่อล้มเหลว";
                document.getElementById('aiStatusText').classList.add('text-red-400');
            }
        };

        // สั่งเปิด/ปิด ระบบ AI ไปยังหลังบ้าน
        async function toggleSystemStatus() {
            const toggle = document.getElementById('aiToggleBtn');
            const isActive = toggle.checked;
            toggle.disabled = true;
            document.getElementById('aiStatusText').innerText = "กำลังอัปเดต...";

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'set_status', status: isActive })
                });
                const result = await response.json();
                if(result.status === 'success') {
                    updateToggleUI(isActive);
                } else {
                    throw new Error("Update Failed");
                }
            } catch(e) {
                alert("เกิดข้อผิดพลาดในการเปลี่ยนสถานะ");
                toggle.checked = !isActive; // Rollback
                updateToggleUI(!isActive);
            } finally {
                toggle.disabled = false;
            }
        }

        // ปรับสี UI ของสวิตช์
        function updateToggleUI(isActive) {
            document.getElementById('aiToggleBtn').checked = isActive;
            const box = document.getElementById('aiToggleBox');
            const text = document.getElementById('aiStatusText');
            if (isActive) {
                box.classList.add('border-green-500/50', 'shadow-[0_0_15px_rgba(34,197,94,0.15)]');
                box.classList.remove('border-red-500/50', 'shadow-[0_0_15px_rgba(239,68,68,0.15)]');
                text.innerHTML = '<span class="text-green-400">● เปิดทำงาน (ออนไลน์)</span>';
            } else {
                box.classList.remove('border-green-500/50', 'shadow-[0_0_15px_rgba(34,197,94,0.15)]');
                box.classList.add('border-red-500/50', 'shadow-[0_0_15px_rgba(239,68,68,0.15)]');
                text.innerHTML = '<span class="text-red-400">● ปิดการใช้งานชั่วคราว</span>';
            }
        }

        function randomString(length) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = '';
            for (let i = 0; i < length; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
            return result;
        }

        async function generateAndSaveKey() {
            const btn = document.getElementById('generateBtn');
            const display = document.getElementById('keyDisplay');
            const status = document.getElementById('statusMsg');
            
            currentGeneratedKey = `WF-${randomString(4)}-${randomString(4)}`;
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังบันทึก...';
            display.innerText = currentGeneratedKey;
            display.classList.add('text-slate-500', 'animate-pulse');
            status.classList.add('hidden');

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'create_key', key: currentGeneratedKey })
                });
                const result = await response.json();

                if (result.status === 'success') {
                    display.classList.remove('text-slate-500', 'animate-pulse');
                    display.classList.add('text-green-400');
                    status.innerHTML = '<i class="fas fa-check-circle"></i> บันทึกแล้ว! คัดลอกส่งลูกค้าได้เลย';
                    status.className = 'text-sm font-medium text-green-400 mt-4 block fade-in';
                } else throw new Error();
            } catch (error) {
                display.classList.remove('animate-pulse', 'text-green-400');
                display.classList.add('text-red-400');
                status.innerHTML = '<i class="fas fa-exclamation-triangle"></i> บันทึกไม่สำเร็จ';
                status.className = 'text-sm font-medium text-red-400 mt-4 block fade-in';
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-magic"></i> สร้าง Key ใหม่อีกครั้ง';
            }
        }

        function copyToClipboard() {
            if (!currentGeneratedKey) return;
            const el = document.createElement('textarea');
            el.value = `เพื่อความปลอดภัย โปรดยืนยันตัวตนผ่านลิงก์ของทางร้าน\n\nลิงก์: [ลิงก์เว็บไซต์]\nAccess Key: ${currentGeneratedKey}`;
            document.body.appendChild(el);
            el.select(); document.execCommand('copy'); document.body.removeChild(el);

            const copyBtn = document.getElementById('copyBtn');
            copyBtn.innerHTML = '<i class="fas fa-check text-green-400"></i>';
            setTimeout(() => { copyBtn.innerHTML = '<i class="fas fa-copy"></i>'; }, 2000);
        }
    </script>
</body>
</html>
